<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<style id="cjg">html{visibility:hidden}</style>
<script>if(self===top){document.documentElement.style.visibility='visible'}else{try{top.location=self.location}catch(e){}}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF1F1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1416" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">

<link rel="icon" href="icon.svg">
<title>カフェ日記 — トロフィー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="achievements.js"></script>
<style>
/* ============================================================
   カフェ日記 トロフィー — iOS (Apple HIG) × もっと可愛い（index.html と同一トークン）
   獲得=ローズ tint、未獲得=低強調。iOS セマンティック × ローズパステル。
   フォント: Zen Maru Gothic 先頭 + iOS フォールバック。
   JS・id・class・データキー(cafeLog.v1)は一切変更していない（見た目層のみ）。
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --tint:#CF3A6E; --on-tint:#FFFFFF;
  --tint-weak:#FDE3EC; --on-tint-weak:#7A2342;
  --label:#3B2E2C; --secondary-label:#776663; --tertiary-label:#8A7C79;
  --bg:#FBF1F1; --bg-elevated:#FFFFFF;
  --fill:#F4E7E7; --fill-2:#FBEFF0;
  --separator:rgba(60,40,40,.12); --separator-weak:rgba(60,40,40,.08);
  --star:#C87411; --focus:#C2557C;
  --shadow-card:0 6px 20px rgba(80,40,50,.08);
  --font-sys:"Zen Maru Gothic",-apple-system,system-ui,"Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif;
  --r-xs:10px;--r-sm:14px;--r-md:18px;--r-lg:22px;--r-full:999px;
  --dur-fast:200ms;
  --ease-standard:cubic-bezier(.2,0,0,1);--ease-accelerate:cubic-bezier(.4,0,1,1);
  --ease-decelerate:cubic-bezier(.16,1,.3,1);--ease-spring:cubic-bezier(.34,1.4,.64,1);
}
@media (prefers-color-scheme:dark){
  :root{
    --tint:#FF9CB6; --on-tint:#3A0F1E;
    --tint-weak:#4A2330; --on-tint-weak:#FFD7E3;
    --label:#F2E7E5; --secondary-label:#B8A6A3; --tertiary-label:#90807D;
    --bg:#1A1416; --bg-elevated:#241B1E;
    --fill:#2C2125; --fill-2:#271D21;
    --separator:rgba(255,235,235,.14); --separator-weak:rgba(255,235,235,.08);
    --star:#FFC65C;
  }
}
html,body{height:100%;}
html{background-color:var(--bg);}
body{font-family:var(--font-sys);color:var(--label);background-color:var(--bg);
  min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.5;letter-spacing:.01em;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px calc(env(safe-area-inset-bottom) + 80px);}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:8px;}

.back{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--tint);
  text-decoration:none;margin-bottom:18px;min-height:44px;transition:filter .2s var(--ease-standard);}
.back:hover{filter:brightness(.95);}
.title{font-size:34px;line-height:41px;font-weight:900;letter-spacing:.005em;color:var(--label);}
.score{font-size:14px;color:var(--secondary-label);margin-top:6px;font-weight:500;letter-spacing:.2px;font-variant-numeric:tabular-nums;}
.scorebar{height:8px;border-radius:var(--r-full);background:var(--fill);overflow:hidden;margin:12px 0 4px;}
.scorebar i{display:block;height:100%;background:var(--tint);border-radius:var(--r-full);}
/* group 見出し = 淡ローズ pill */
.group-h{font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--on-tint-weak);background:var(--tint-weak);
  display:inline-block;padding:7px 16px;border-radius:var(--r-full);margin:28px 0 10px;}
.group-h .grp-n{font-weight:500;opacity:.75;margin-left:4px;font-variant-numeric:tabular-nums;}
/* list item（獲得=on / 未獲得=低強調） */
.tr{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--separator);}
.tr:last-child{border-bottom:none;}
.tr-badge{width:46px;height:46px;flex-shrink:0;border-radius:var(--r-md);display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:700;border:1.5px solid var(--separator);color:var(--tertiary-label);background:var(--fill);}
.tr.on .tr-badge{background:var(--tint);color:var(--on-tint);border-color:transparent;box-shadow:var(--shadow-card);}
.tr-body{flex:1;min-width:0;}
.tr-title{font-size:16px;font-weight:700;color:var(--secondary-label);}
.tr.on .tr-title{color:var(--label);}
.tr-desc{font-size:13px;color:var(--secondary-label);margin-top:1px;}
.tr-prog{height:5px;border-radius:var(--r-full);background:var(--fill);overflow:hidden;margin-top:7px;}
.tr-prog i{display:block;height:100%;background:var(--tertiary-label);border-radius:var(--r-full);}
.tr.on .tr-prog i{background:var(--tint);}
.tr-have{flex-shrink:0;font-size:13px;font-weight:700;color:var(--secondary-label);min-width:48px;text-align:right;font-variant-numeric:tabular-nums;}
.tr.on .tr-have{color:var(--tint);}
.foot{margin-top:30px;text-align:center;font-size:13px;color:var(--secondary-label);line-height:1.7;}
.empty-note{font-size:14px;color:var(--secondary-label);text-align:center;padding:8px 0 4px;letter-spacing:.2px;}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms var(--ease-accelerate) both; }
::view-transition-new(root){ animation: vtIn 360ms var(--ease-decelerate) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;}
  ::view-transition-old(root),::view-transition-new(root){animation:none!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">トロフィー</div>
  <div class="score" id="score"></div>
  <div class="scorebar"><i id="scorebar"></i></div>
  <div id="list"></div>
  <div class="foot">カフェを記録すると自動で獲得 ✦</div>
</div>
<script>
const KEY='cafeLog.v1'
function loadRecords(){try{const r=JSON.parse(localStorage.getItem(KEY));if(!r)return[];return Array.isArray(r)?r:(r.records||[])}catch(e){return[]}}
const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

const records=loadRecords()
const ach=(window.computeAchievements?computeAchievements(records):[])
const earnedN=ach.filter(a=>a.earned).length
$('score').textContent=`${earnedN} / ${ach.length} 獲得`
$('scorebar').style.width=ach.length?Math.round(earnedN/ach.length*100)+'%':'0%'

function trItem(a){
  return `<div class="tr ${a.earned?'on':''}">
      <div class="tr-badge">${a.earned?'✓':'🔒'}</div>
      <div class="tr-body">
        <div class="tr-title">${esc(a.title)}</div>
        <div class="tr-desc">${esc(a.desc)}</div>
        <div class="tr-prog"><i style="width:${Math.round(a.pct*100)}%"></i></div>
      </div>
      <div class="tr-have">${a.earned?'獲得':a.have+'/'+a.target}</div>
    </div>`
}
function section(title,items){
  if(!items.length) return ''
  const e=items.filter(a=>a.earned).length
  return `<div class="group-h">${esc(title)} <span class="grp-n">${e}/${items.length}</span></div>`+items.map(trItem).join('')
}
// 総合 → ドリンクごと（各セクションに デビュー/マニア/極み）
const genres=(window.MENCHO_GENRES||[])
let html=section('総合', ach.filter(a=>a.group==='総合'))
genres.forEach(g=>{ html+=section(g, ach.filter(a=>a.id.split(':')[1]===g)) })
// 記録が無くても全トロフィーを一覧表示（目標を眺められる）
$('list').innerHTML = (records.length?'':'<div class="empty-note">まだ記録なし。これが集めるトロフィー一覧 ✦</div>') + html
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
