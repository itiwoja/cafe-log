<head>

<style>
/* ============================================================
   カフェ日記 分析 — iOS (Apple HIG) × もっと可愛い（index.html と同一トークン）
   データが主役、UIシェルは控えめ。iOS セマンティック × ローズパステル。
   草/カレンダー/バーは tint(ローズ)不透明度スケール。
   フォント: Zen Maru Gothic 先頭 + iOS フォールバック。
   JS・id・class・データキー(cafeLog.v1)は一切変更していない（見た目層のみ）。
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* === iOS セマンティック × ローズパステル（Light）: index.html と同一基調 === */
  --tint:#CF3A6E; --on-tint:#FFFFFF;
  --tint-weak:#FDE3EC; --on-tint-weak:#7A2342;
  --label:#3B2E2C; --secondary-label:#776663; --tertiary-label:#8A7C79;
  --bg:#FBF1F1; --bg-elevated:#FFFFFF;
  --fill:#F4E7E7; --fill-2:#FBEFF0;
  --separator:rgba(60,40,40,.12); --separator-weak:rgba(60,40,40,.08);
  --star:#C87411;
  /* ヒートスケール（草/カレンダー）= tint(ローズ)を不透明度で展開。
     文字は濃い --label(#3B2E2C) なので全段で AA(>=4.5:1) を満たす。 */
  --heat-0:var(--fill);
  --heat-1:rgba(207,58,110,.24);
  --heat-2:rgba(207,58,110,.46);
  --heat-3:rgba(207,58,110,.64);
  --heat-4:rgba(207,58,110,.92);
  --focus:#C2557C;
  --shadow-card:0 6px 20px rgba(80,40,50,.08);
  --font-sys:"Zen Maru Gothic",-apple-system,system-ui,"Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif;
  --r-xs:10px;--r-sm:14px;--r-md:18px;--r-lg:22px;--r-full:999px;
  --dur-fast:200ms;
  --ease-standard:cubic-bezier(.2,0,0,1);
  --ease-accelerate:cubic-bezier(.4,0,1,1);
  --ease-decelerate:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.4,.64,1);
}
@media (prefers-color-scheme:dark){
  :root{
    --tint:#FF9CB6; --on-tint:#3A0F1E;
    --tint-weak:#4A2330; --on-tint-weak:#FFD7E3;
    --label:#F2E7E5; --secondary-label:#B8A6A3; --tertiary-label:#90807D;
    --bg:#1A1416; --bg-elevated:#241B1E;
    --fill:#2C2125; --fill-2:#271D21;
    --separator:rgba(255,235,235,.14); --separator-weak:rgba(255,235,235,.08);
    --star:#FFC65C;
    /* dark: 明色ローズを不透明度で展開。文字(--label=明色)が常に AA(>=4.5:1) に
       なるよう最大 0.40 までに抑える（段階差で温度は伝わる）。 */
    --heat-0:var(--fill);
    --heat-1:rgba(255,156,182,.14);
    --heat-2:rgba(255,156,182,.26);
    --heat-3:rgba(255,156,182,.36);
    --heat-4:rgba(255,156,182,.40);
  }
}
html,body{height:100%;}
html{background-color:var(--bg);}
body{font-family:var(--font-sys);color:var(--label);background-color:var(--bg);
  min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.5;letter-spacing:.01em;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px calc(env(safe-area-inset-bottom) + 80px);}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:8px;}

/* iOS 戻りリンク */
.back{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--tint);
  text-decoration:none;margin-bottom:18px;min-height:44px;
  transition:color var(--dur-fast) var(--ease-standard);}
.back:hover{filter:brightness(.95);}
.title{font-size:34px;line-height:41px;font-weight:900;letter-spacing:.005em;color:var(--label);margin-bottom:20px;}

/* iOS インセットグループ（白カード・大角丸・ふんわり影） */
.stats{display:flex;background:var(--bg-elevated);border-radius:var(--r-lg);overflow:hidden;margin-bottom:30px;box-shadow:var(--shadow-card);}
.stat{flex:1;padding:16px 4px;text-align:center;position:relative;}
.stat + .stat::before{content:'';position:absolute;left:0;top:16px;bottom:16px;width:1px;background:var(--separator);}
.stat .v{font-size:22px;font-weight:700;line-height:1.15;color:var(--label);font-variant-numeric:tabular-nums;}
.stat .v small{font-size:13px;color:var(--secondary-label);font-weight:500;}
.stat .l{font-size:12px;color:var(--secondary-label);margin-top:6px;font-weight:500;letter-spacing:.3px;}

.sec{margin-bottom:34px;}
/* 罫線見出し（控えめ・data 主役） */
.sec-h{font-size:13px;font-weight:700;letter-spacing:.4px;color:var(--secondary-label);text-transform:none;
  margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--separator);}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.bar-label{width:64px;flex-shrink:0;font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:10px;background:var(--fill);border-radius:var(--r-full);overflow:hidden;}
.bar-fill{height:100%;background:var(--tint);border-radius:var(--r-full);min-width:3px;}
.bar-val{width:54px;flex-shrink:0;text-align:right;font-size:14px;font-weight:700;color:var(--label);font-variant-numeric:tabular-nums;}
.bar-val small{color:var(--secondary-label);font-weight:500;}
/* ストリーク */
.streaks{display:flex;background:var(--bg-elevated);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-card);}
.sk{flex:1;padding:16px 4px;text-align:center;position:relative;}
.sk + .sk::before{content:'';position:absolute;left:0;top:16px;bottom:16px;width:1px;background:var(--separator);}
.sk-v{font-size:22px;font-weight:700;color:var(--label);font-variant-numeric:tabular-nums;}
.sk-v small{font-size:13px;color:var(--secondary-label);font-weight:500;}
.sk-l{font-size:12px;color:var(--secondary-label);margin-top:6px;font-weight:500;letter-spacing:.3px;}
/* カフェ活グラフ（草） */
.grass-scroll{overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.grass-scroll::-webkit-scrollbar{display:none;}
.grass-inner{width:max-content;}
.grass-cols{display:flex;gap:3px;}
.g-col{display:flex;flex-direction:column;gap:3px;}
.g-cell{width:12px;height:12px;border-radius:4px;background:var(--heat-0);}
.g-mrow{display:flex;gap:3px;margin-bottom:4px;}
.g-mlabel{width:12px;font-size:10px;color:var(--secondary-label);white-space:nowrap;font-weight:500;}
.g0{background:var(--heat-0);}
.g1{background:var(--heat-1);}
.g2{background:var(--heat-2);}
.g3{background:var(--heat-3);}
.g4{background:var(--heat-4);}
.lg.g0{background:var(--heat-0);}.lg.g1{background:var(--heat-1);}.lg.g2{background:var(--heat-2);}.lg.g3{background:var(--heat-3);}.lg.g4{background:var(--heat-4);}

/* カレンダー */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:17px;font-weight:700;color:var(--label);font-variant-numeric:tabular-nums;}
.cal-nav{min-width:44px;min-height:44px;width:44px;height:44px;border:none;background:var(--fill);border-radius:50%;font-size:18px;font-weight:700;cursor:pointer;color:var(--tint);
  transition:background var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.cal-nav:hover{background:var(--fill-2);}
.cal-nav:active{transform:scale(.92);background:var(--tint-weak);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-wd{margin-bottom:6px;}
.cal-wd-c{text-align:center;font-size:11px;color:var(--secondary-label);font-weight:700;}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:var(--r-sm);color:var(--label);background:var(--heat-0);font-variant-numeric:tabular-nums;}
.cal-cell.empty{background:transparent;}
.cal-cell.lv0{background:var(--heat-0);color:var(--secondary-label);}
.cal-cell.lv1{background:var(--heat-1);color:var(--label);}
.cal-cell.lv2{background:var(--heat-2);color:var(--label);}
.cal-cell.lv3{background:var(--heat-3);color:var(--label);}
.cal-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:10px;font-size:11px;color:var(--secondary-label);}
.lg{width:14px;height:14px;border-radius:4px;display:inline-block;}
.lg.lv0{background:var(--heat-0);}.lg.lv1{background:var(--heat-1);}.lg.lv2{background:var(--heat-2);}.lg.lv3{background:var(--heat-3);}

/* 殿堂 */
.hall{display:flex;flex-direction:column;gap:12px;}
.hall-item{display:flex;align-items:center;gap:12px;}
.hall-rank{width:22px;flex-shrink:0;font-size:16px;font-weight:700;color:var(--secondary-label);text-align:center;font-variant-numeric:tabular-nums;}
.hall-photo{width:54px;height:54px;flex-shrink:0;border-radius:var(--r-md);background:var(--fill);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--secondary-label);font-weight:500;overflow:hidden;}
.hall-photo img{width:100%;height:100%;object-fit:cover;}
.hall-body{flex:1;min-width:0;}
.hall-menu{font-size:17px;font-weight:700;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hall-shop{font-size:13px;color:var(--secondary-label);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hall-stars{font-size:13px;letter-spacing:1px;margin-top:3px;}

/* お店 */
.shops{display:flex;flex-direction:column;}
.shop{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--separator-weak);
  text-decoration:none;color:inherit;}
.shop:last-child{border-bottom:none;}
.shop-body{flex:1;min-width:0;}
.shop-name{font-size:17px;font-weight:700;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shop-sub{font-size:13px;color:var(--secondary-label);margin-top:2px;}
.shop-count{flex-shrink:0;text-align:right;}
.shop-count b{font-size:20px;font-weight:700;color:var(--tint);font-variant-numeric:tabular-nums;}
.shop-count span{font-size:11px;color:var(--secondary-label);display:block;}
.shop-arrow{color:var(--secondary-label);font-weight:700;}

.none{padding:30px 0;text-align:center;color:var(--secondary-label);font-size:14px;}
.empty-all{padding:100px 24px;text-align:center;color:var(--secondary-label);}
.empty-all .t{font-size:17px;font-weight:700;color:var(--label);}

.hall-stars,.pop-stars{color:var(--star);}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms var(--ease-accelerate) both; }
::view-transition-new(root){ animation: vtIn 360ms var(--ease-decelerate) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;}
  ::view-transition-old(root),::view-transition-new(root){animation:none!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">分析</div>
  <div id="content"></div>
</div>

<script>
// ===== データ読み込み (index.html と同じ localStorage) =====
const KEY='cafeLog.v1'
function loadRecords(){
  try{const raw=JSON.parse(localStorage.getItem(KEY));if(!raw)return [];return Array.isArray(raw)?raw:(raw.records||[])}
  catch(e){return []}
}
const records=loadRecords()
const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n)}

// ===== 写真 (IndexedDB) — 殿堂のサムネ用 =====
const IDB_NAME='cafechoDB',IDB_STORE='photos';let _db=null
function idbOpen(){return new Promise((res,rej)=>{if(_db)return res(_db);const rq=indexedDB.open(IDB_NAME,1);
  rq.onupgradeneeded=()=>{const db=rq.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE)};
  rq.onsuccess=()=>{_db=rq.result;res(_db)};rq.onerror=()=>rej(rq.error)})}
async function idbGet(id){try{const db=await idbOpen();return await new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const rq=tx.objectStore(IDB_STORE).get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error)})}catch(e){return null}}
async function fillPhotos(root){
  for(const el of root.querySelectorAll('[data-pid]')){
    const b=await idbGet(el.dataset.pid)
    if(b){const u=URL.createObjectURL(b);const img=document.createElement('img');img.src=u;el.replaceChildren(img)}
  }
}

function bar(label,val,max,unit){
  const w=max>0?Math.round(val/max*100):0
  return `<div class="bar-row"><div class="bar-label">${esc(label)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
    <div class="bar-val">${val}<small>${unit||''}</small></div></div>`
}

function render(){
  if(!records.length){
    $('content').innerHTML='<div class="empty-all"><div class="t">まだ記録がないよ</div></div>'
    return
  }
  // 概要
  const total=records.reduce((a,r)=>a+(Number(r.price)||0),0)
  const rated=records.filter(r=>r.stars>0)
  const avg=rated.length?(rated.reduce((a,r)=>a+r.stars,0)/rated.length):0
  const gc={};records.forEach(r=>{if(r.type)gc[r.type]=(gc[r.type]||0)+1})
  const mfn=Object.entries(gc).sort((a,b)=>b[1]-a[1])[0]
  let html=`<div class="stats">
    <div class="stat"><div class="v">${records.length}</div><div class="l">杯</div></div>
    <div class="stat"><div class="v">¥${total.toLocaleString()}</div><div class="l">合計</div></div>
    <div class="stat"><div class="v">${avg?avg.toFixed(1):'–'}<small>★</small></div><div class="l">平均</div></div>
    <div class="stat"><div class="v" style="font-size:14px">${mfn?esc(mfn[0]):'–'}</div><div class="l">推し</div></div>
  </div>`

  // 連続記録
  const st=window.computeStreak?computeStreak(records):{current:0,longest:0,days:0}
  html+=`<div class="sec"><div class="sec-h">連続記録</div>
    <div class="streaks">
      <div class="sk"><div class="sk-v">${st.current}<small>日</small></div><div class="sk-l">現在の連続</div></div>
      <div class="sk"><div class="sk-v">${st.longest}<small>日</small></div><div class="sk-l">最長連続</div></div>
      <div class="sk"><div class="sk-v">${st.days}<small>日</small></div><div class="sk-l">カフェ活した日数</div></div>
    </div></div>`

  // カフェ活グラフ（GitHubの草風・過去1年）
  html+=`<div class="sec"><div class="sec-h">カフェ活グラフ（過去1年）</div><div id="grass"></div></div>`

  // カフェ活カレンダー（月別）
  html+=`<div class="sec"><div class="sec-h">カフェ活カレンダー</div><div id="cal"></div></div>`

  // 月別
  const mc={};records.forEach(r=>{if(r.date){const k=r.date.slice(0,7);mc[k]=mc[k]||{n:0,y:0};mc[k].n++;mc[k].y+=Number(r.price)||0}})
  const months=Object.keys(mc).sort().slice(-12)
  if(months.length){
    const max=Math.max(...months.map(m=>mc[m].n))
    html+=`<div class="sec"><div class="sec-h">月別の杯数</div>${
      months.map(m=>{const[y,mm]=m.split('-');return bar(`${y.slice(2)}/${mm}`,mc[m].n,max,'杯')}).join('')
    }</div>`
  }

  // ジャンル別
  const genres=Object.entries(gc).sort((a,b)=>b[1]-a[1])
  if(genres.length){
    const max=genres[0][1]
    html+=`<div class="sec"><div class="sec-h">ジャンル別</div>${
      genres.map(([g,n])=>bar(g,n,max,'杯')).join('')
    }</div>`
  }

  // ★分布
  if(rated.length){
    const dist=[5,4,3,2,1].map(s=>({s,n:records.filter(r=>r.stars===s).length}))
    const max=Math.max(...dist.map(d=>d.n))
    html+=`<div class="sec"><div class="sec-h">評価の分布</div>${
      dist.map(d=>bar('★'+d.s,d.n,max,'')).join('')
    }</div>`
  }

  // 殿堂 (★4以上)
  const hall=records.filter(r=>r.stars>=4).sort((a,b)=>(b.stars-a.stars)||((b.date||'').localeCompare(a.date||''))).slice(0,12)
  html+=`<div class="sec"><div class="sec-h">殿堂入り（★4以上）</div>`
  if(hall.length){
    html+=`<div class="hall">${hall.map((r,i)=>`
      <div class="hall-item">
        <div class="hall-rank">${i+1}</div>
        <div class="hall-photo" ${(r.photo||r.hasPhoto)?`data-pid="${r.id}"`:''}>${r.photo?`<img src="${r.photo}">`:(r.hasPhoto?'':'珈')}</div>
        <div class="hall-body">
          <div class="hall-menu">${esc(r.menu)||'（無題）'}</div>
          <div class="hall-shop">${esc(r.shop)||'お店未設定'}</div>
          <div class="hall-stars">${starStr(r.stars)}</div>
        </div>
      </div>`).join('')}</div>`
  }else html+=`<div class="none">★4以上の記録がまだないよ</div>`
  html+=`</div>`

  // お店ごと
  const sc={}
  records.forEach(r=>{const s=(r.shop||'').trim();if(!s)return;
    sc[s]=sc[s]||{n:0,star:0,rated:0,y:0,last:''}
    sc[s].n++;sc[s].y+=Number(r.price)||0
    if(r.stars>0){sc[s].star+=r.stars;sc[s].rated++}
    if((r.date||'')>sc[s].last)sc[s].last=r.date||''
  })
  const shops=Object.entries(sc).sort((a,b)=>b[1].n-a[1].n)
  html+=`<div class="sec"><div class="sec-h">お店ごとのまとめ</div>`
  if(shops.length){
    html+=`<div class="shops">${shops.map(([s,d])=>{
      const av=d.rated?(d.star/d.rated).toFixed(1)+'★':'–'
      return `<a class="shop" href="index.html?q=${encodeURIComponent(s)}">
        <div class="shop-body">
          <div class="shop-name">${esc(s)}</div>
          <div class="shop-sub">平均 ${av} ・ ¥${d.y.toLocaleString()} ・ 最終 ${d.last||'–'}</div>
        </div>
        <div class="shop-count"><b>${d.n}</b><span>杯</span></div>
        <div class="shop-arrow">›</div>
      </a>`
    }).join('')}</div>`
  }else html+=`<div class="none">お店名つきの記録がまだないよ</div>`
  html+=`</div>`

  $('content').innerHTML=html
  fillPhotos($('content'))
  renderGrass()
  renderCalendar()
}

// カフェ活グラフ（過去1年・週=列 / 曜日=行）
function renderGrass(){
  const el=$('grass'); if(!el) return
  const counts={}; records.forEach(r=>{if(r.date)counts[r.date]=(counts[r.date]||0)+1})
  const toISO=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`
  const end=new Date(); end.setHours(0,0,0,0)
  const start=new Date(end); start.setDate(start.getDate()-364); start.setDate(start.getDate()-start.getDay()) // 日曜起点
  const WK=['日','月','火','水','木','金','土']
  // 月ラベル（週ごとに月が変わったら表示）
  const weeks=[]; let week=[]; const cur=new Date(start)
  while(cur<=end){
    const iso=toISO(cur), c=counts[iso]||0
    const lvl=c===0?0:c===1?1:c===2?2:c===3?3:4
    week.push(`<div class="g-cell g${lvl}" title="${iso} ・ ${c}杯"></div>`)
    if(cur.getDay()===6){weeks.push({cells:week,m:cur.getMonth()}); week=[]}
    cur.setDate(cur.getDate()+1)
  }
  if(week.length)weeks.push({cells:week,m:end.getMonth()})
  let lastM=-1
  const labels=weeks.map(w=>{const show=w.m!==lastM; lastM=w.m; return `<div class="g-mlabel">${show?(w.m+1)+'月':''}</div>`}).join('')
  const cols=weeks.map(w=>`<div class="g-col">${w.cells.join('')}</div>`).join('')
  el.innerHTML=`
    <div class="grass-scroll">
      <div class="grass-inner">
        <div class="g-mrow">${labels}</div>
        <div class="grass-cols">${cols}</div>
      </div>
    </div>
    <div class="cal-legend">少 <i class="lg g0"></i><i class="lg g1"></i><i class="lg g2"></i><i class="lg g3"></i><i class="lg g4"></i> 多</div>`
}

// カフェ活カレンダー (月送り)
let calY,calM
function renderCalendar(){
  const cal=$('cal'); if(!cal) return
  if(calY===undefined){const n=new Date();calY=n.getFullYear();calM=n.getMonth()}
  const counts={}; records.forEach(r=>{if(r.date)counts[r.date]=(counts[r.date]||0)+1})
  const startDow=new Date(calY,calM,1).getDay()
  const dim=new Date(calY,calM+1,0).getDate()
  const wd=['日','月','火','水','木','金','土']
  let cells=''
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`
  for(let d=1;d<=dim;d++){
    const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const c=counts[iso]||0
    const lvl=c===0?0:c===1?1:c===2?2:3
    cells+=`<div class="cal-cell lv${lvl}">${d}</div>`
  }
  cal.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" id="calPrev" aria-label="前の月">‹</button>
      <span class="cal-title">${calY}年${calM+1}月</span>
      <button class="cal-nav" id="calNext" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid cal-wd">${wd.map(w=>`<div class="cal-wd-c">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">少 <i class="lg lv0"></i><i class="lg lv1"></i><i class="lg lv2"></i><i class="lg lv3"></i> 多</div>`
  $('calPrev').onclick=()=>{calM--; if(calM<0){calM=11;calY--} renderCalendar()}
  $('calNext').onclick=()=>{calM++; if(calM>11){calM=0;calY++} renderCalendar()}
}
render()
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
