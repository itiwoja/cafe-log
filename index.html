<title>カフェ日記 — カフェの記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* コラージュ/スクラップブック配色（紙＋マスキングテープ色） */
  --paper:#FBF3EF;
  /* テキスト色は WCAG AA(本文4.5:1) を満たす濃さに調整。雰囲気(ダスティローズ系)は維持 */
  --ink:#4B3A40;--ink-2:#6A565D;--ink-3:#7A646F;
  --line:#EEE0DB;--line-2:#F6ECE8;
  --card:#FFFFFF;
  /* 装飾の塗りはパステルのまま。文字を載せる/テキストに使う時だけ濃い派生色を使う */
  --tape1:#A86A2A;            /* 星(評価)=情報を持つので 3:1 以上を確保したアンバー */
  --tape2:#A85C74;            /* 白文字を載せるローズ帯 (4.5:1) */
  --tape3:#D98FA0;            /* ブランドのブラッシュピンク(装飾専用・維持) */
  --tape4:#7E6796;            /* 白文字を載せるモーブ(4.5:1) */
  --tape3-deep:#B35870;       /* ピンク塗り＋白文字 (FAB/保存/バッジ) 4.5:1 */
  --tape3-text:#AE536B;       /* ピンクを文字色に使う時 (合計/連続記録など) 4.5:1 */
  --focus:#7A3A52;            /* フォーカスリング(アクセント系の濃ローズ) */
  --red:#C0392B;              /* エラー/削除の警告色(あたたかいローズレッド・4.5:1) */
  /* モーション・トークン（motion-design / ≤200ms・transform/opacityのみ駆動・大人可愛いのやわらかさ） */
  --ease-standard:cubic-bezier(.2,0,0,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);  /* ふわっと弾むスプリング感 */
  --dur-fast:140ms;--dur:200ms;
}
html,body{height:100%;}
body{font-family:'Zen Maru Gothic','Klee One',sans-serif;color:var(--ink);
  background-color:var(--paper);
  background-image:radial-gradient(rgba(43,40,35,.06) 1.2px, transparent 1.2px);
  background-size:20px 20px;
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.wrap{max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px 120px;}

/* header */
.head{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:20px;}
.logo-word{font-size:23px;font-weight:900;color:var(--ink);letter-spacing:2px;}
.logo-sub{font-size:9.5px;color:var(--ink-3);letter-spacing:3.5px;margin-top:4px;font-weight:700;}
.gear{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:transparent;
  color:var(--ink-2);font-size:16px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;justify-content:center;font-weight:700;}
.gear:active{background:var(--line-2);}
.head-actions{display:flex;gap:8px;}

/* stats — カードでなく罫線で区切るフラットな数値帯 */
.stats{display:flex;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:22px;}
.stat{flex:1;padding:14px 4px;text-align:center;}
.stat + .stat{border-left:1px solid var(--line);}
.stat .v{font-size:21px;font-weight:900;color:var(--ink);line-height:1;letter-spacing:.5px;}
.stat .v small{font-size:11px;font-weight:700;color:var(--ink-3);margin-left:1px;}
.stat .l{font-size:9px;color:var(--ink-3);margin-top:7px;font-weight:700;letter-spacing:1px;}

.streak-line{display:none;text-align:center;font-size:13px;font-weight:800;color:var(--ink);
  background:var(--line-2);border-radius:8px;padding:8px;margin-bottom:14px;letter-spacing:.5px;}

/* filter — 角丸アウトライン / アクティブは墨ベタ(モノクロ) */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:18px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fchip{flex-shrink:0;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;
  background:transparent;color:var(--ink-2);border:1px solid var(--line);}
.fchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.fchip.tag{font-size:11px;color:var(--ink-3);}
.fchip.tag.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
#tagFilters{margin-top:-8px;}
#tagFilters:empty{display:none;}

/* タグのバッジ */
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.tagb{font-size:10px;font-weight:700;color:var(--ink-2);background:var(--line-2);border-radius:5px;padding:2px 7px;}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px;}
.wchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* list — 影なし・薄い罫線・写真が主役 */
.list{display:flex;flex-direction:column;gap:14px;}
.list-hint{font-size:11px;color:var(--ink-3);text-align:center;margin-bottom:12px;letter-spacing:.5px;}
.card-wrap{position:relative;border-radius:6px;overflow:hidden;}
.card-del{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;cursor:pointer;
  padding-right:22px;background:var(--ink);color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;}
.card{display:flex;background:var(--card);border:1px solid var(--line);border-radius:6px;
  overflow:hidden;cursor:pointer;position:relative;touch-action:pan-y;
  transition:transform .16s ease, opacity .16s ease, border-color .15s;}
.card:active{border-color:var(--ink-3);}
.card-photo{width:96px;flex-shrink:0;align-self:stretch;object-fit:cover;min-height:104px;position:relative;}
.card-photo.ph{background:var(--line-2);display:flex;align-items:center;justify-content:center;}
.photo-n{position:absolute;right:4px;bottom:4px;background:rgba(11,11,11,.8);color:#fff;font-size:9px;
  font-weight:800;padding:1px 6px;border-radius:6px;font-style:normal;}
.card-photo.ph span{font-size:11px;color:var(--ink-3);font-weight:700;letter-spacing:1px;}
.card-body{flex:1;padding:14px 16px;min-width:0;}
.card-shop{font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-menu{font-size:17px;font-weight:900;color:var(--ink);margin-top:2px;line-height:1.3;letter-spacing:.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:9px;}
.tchip{font-size:10.5px;font-weight:700;color:var(--ink-2);border:1px solid var(--line);
  padding:2px 8px;border-radius:5px;letter-spacing:.5px;}
.stars{font-size:13px;color:var(--ink);letter-spacing:2px;}
.stars .off{color:var(--line);}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;
  padding-top:10px;border-top:1px solid var(--line-2);}
.card-date{font-size:10.5px;color:var(--ink-3);letter-spacing:.5px;}
.card-price{font-size:12px;font-weight:700;color:var(--ink-2);}

/* empty */
.empty{text-align:center;padding:90px 24px;color:var(--ink-3);}
.empty .e{font-size:30px;font-weight:900;color:var(--line);letter-spacing:4px;margin-bottom:18px;}
.empty .t{font-size:15px;font-weight:700;color:var(--ink-2);}
.empty .d{font-size:13px;margin-top:10px;line-height:1.8;color:var(--ink-3);}
/* 空状態のオンボーディングCTA（FABと同じ openAdd を呼ぶ・先にやってみるを促す。シール風で大人可愛い） */
.empty-cta{margin-top:26px;background:var(--tape3);color:#fff;border:none;border-radius:16px;
  padding:14px 26px;font-family:'Klee One',cursive;font-size:16px;font-weight:600;letter-spacing:.5px;cursor:pointer;
  transform:rotate(-2deg);box-shadow:0 8px 18px rgba(217,143,160,.4);}
.empty-cta:active{transform:rotate(-2deg) scale(.92);}

/* 検索/フィルタ結果0件の親切な空状態（条件クリア導線つき） */
.no-result{text-align:center;padding:48px 24px;}
.no-result .nr-t{font-size:15px;font-weight:700;color:var(--ink-2);}
.no-result .nr-d{font-size:13px;color:var(--ink-3);margin-top:8px;line-height:1.7;}
.nr-clear{margin-top:18px;background:#fff;color:var(--tape3-text);border:2px dashed var(--tape3);border-radius:999px;
  padding:10px 20px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;min-height:44px;letter-spacing:.5px;}
.nr-clear:active{transform:scale(.92);}

/* FAB — 墨ベタの細身ピル */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 22px);
  background:var(--ink);color:var(--paper);border:none;border-radius:999px;
  padding:14px 26px;font-family:inherit;font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;
  box-shadow:0 6px 20px rgba(26,23,20,.22);z-index:40;}
.fab:active{transform:translateX(-50%) scale(.96);}

/* sheet */
.mask{position:fixed;inset:0;background:rgba(26,23,20,.4);opacity:0;visibility:hidden;transition:.26s;z-index:50;}
.mask.on{opacity:1;visibility:visible;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--paper);
  border-radius:18px 18px 0 0;z-index:51;transform:translateY(100%);
  transition:transform .32s cubic-bezier(.16,1,.3,1);max-height:92dvh;overflow-y:auto;
  padding:0 22px calc(env(safe-area-inset-bottom) + 24px);}
.sheet.on{transform:none;}
.grip{width:36px;height:4px;border-radius:2px;background:var(--line);margin:12px auto 6px;}
.sheet-title{font-size:18px;font-weight:900;letter-spacing:1px;margin:6px 0 22px;}

/* photo picker — フラット */
.photo-pick{width:100%;min-height:120px;border-radius:6px;border:1px dashed var(--line);
  background:var(--line-2);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:14px;margin-bottom:22px;}
.photo-strip{display:flex;gap:8px;width:100%;overflow-x:auto;scrollbar-width:none;}
.photo-strip::-webkit-scrollbar{display:none;}
.ps-thumb{flex:0 0 auto;width:76px;height:76px;border-radius:6px;position:relative;
  background:var(--line) center/cover no-repeat;}
.ps-x{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:none;
  background:var(--ink);color:#fff;font-size:12px;cursor:pointer;line-height:1;}
.pp-empty{display:flex;gap:12px;}
.pp-opt{background:var(--paper);border:1px solid var(--line);border-radius:8px;
  padding:14px 22px;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;min-width:96px;}
.pp-opt:active{background:var(--line-2);}
.pp-ico{font-size:24px;}
.photo-clear{position:absolute;top:8px;right:8px;background:rgba(26,23,20,.6);color:#fff;border:none;
  width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;z-index:2;}

/* fields — アンダーライン入力 */
.field{margin-bottom:20px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--ink-3);
  margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase;}
.field input[type=text],.field input[type=number],.field textarea{
  width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--line);
  padding:6px 2px;font-family:inherit;font-size:16px;color:var(--ink);}
.field input::placeholder,.field textarea::placeholder{color:var(--ink-3);}
.field input:focus,.field textarea:focus{outline:none;border-bottom-color:var(--ink);}
.field textarea{resize:none;min-height:48px;}
/* 邪魔しないバリデーション: 入力途中では怒らず、確定(フォーカスアウト)後に下線を赤く。 */
.field input:user-invalid{border-bottom-color:var(--red);}
.field input[aria-invalid="true"]{border-bottom-color:var(--red);}
/* インラインエラー(該当欄のすぐ下)。行高を確保しレイアウトシフトを抑える。 */
.field-err{min-height:16px;margin-top:6px;font-size:11.5px;font-weight:700;color:var(--red);
  letter-spacing:.3px;opacity:0;transition:opacity .14s ease;}
.field-err.on{opacity:1;}
@media (prefers-reduced-motion: reduce){.field-err{transition:none;}}
.row2{display:flex;gap:16px;}
.row2 .field{flex:1;}

/* 店名検索 (OSM) */
.shop-row{display:flex;gap:10px;align-items:flex-end;}
.shop-row input{flex:1;width:auto;}
.shop-find{flex-shrink:0;border:1px solid var(--line);background:transparent;border-radius:8px;
  padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-2);cursor:pointer;}
.shop-find:active{background:var(--line-2);}
.shop-results{display:none;flex-direction:column;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:10px;}
.shop-results.on{display:flex;}
.sr-item{padding:10px 12px;border-bottom:1px solid var(--line-2);cursor:pointer;}
.sr-item:last-child{border-bottom:none;}
.sr-item:active{background:var(--line-2);}
.sr-name{font-size:14px;font-weight:700;color:var(--ink);}
.sr-addr{font-size:11px;color:var(--ink-3);margin-top:2px;}
.shop-loc{display:none;font-size:11px;color:var(--ink-2);font-weight:700;margin-top:8px;}
.shop-loc.on{display:block;}

.word-hint{font-size:10px;color:var(--ink-3);margin-top:10px;font-weight:700;letter-spacing:.5px;}
.word-hint a{color:var(--ink-2);}
.word-chips{display:flex;gap:6px;overflow-x:auto;margin-top:8px;padding-bottom:2px;scrollbar-width:none;}
.word-chips::-webkit-scrollbar{display:none;}
.wchip{flex-shrink:0;border:1px solid var(--line);border-radius:999px;padding:5px 11px;
  font-size:12px;font-weight:700;color:var(--ink-2);background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit;}
.wchip:active{background:var(--line-2);}

.type-grid{display:flex;flex-wrap:wrap;gap:8px;}
.type-opt{padding:9px 15px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;
  background:transparent;color:var(--ink-2);border:1px solid var(--line);}
.type-opt.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.star-pick{display:flex;gap:8px;}
.star-pick span{font-size:32px;color:var(--line);cursor:pointer;transition:transform .1s;}
.star-pick span.on{color:var(--ink);}
.star-pick span:active{transform:scale(1.2);}

.save-btn{width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:10px;
  padding:16px;font-family:inherit;font-size:16px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-top:8px;}
.save-btn:active{transform:scale(.98);}
.save-btn:disabled{opacity:.55;cursor:default;transform:none;}
.del-btn{width:100%;background:transparent;color:var(--ink-3);border:none;
  padding:14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;
  text-decoration:underline;text-underline-offset:3px;}

/* backup */
.store-status{margin-top:10px;font-size:11px;font-weight:700;color:var(--ink);}
.bk-info{font-size:12px;color:var(--ink-2);line-height:1.8;border:1px solid var(--line);
  border-radius:8px;padding:13px 15px;margin-bottom:18px;}
.bk-btn{width:100%;border:1px solid var(--line);background:transparent;border-radius:10px;
  padding:15px;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;
  margin-bottom:10px;display:flex;align-items:center;gap:10px;justify-content:center;letter-spacing:.5px;}
.bk-btn:active{background:var(--line-2);}
.bk-btn .bi{font-size:16px;}

/* toolbar: 検索 + 並び替え */
.toolbar{display:flex;gap:8px;margin-bottom:14px;}
.search{flex:1;min-width:0;background:transparent;border:1px solid var(--line);border-radius:8px;
  padding:9px 13px;font-family:inherit;font-size:14px;color:var(--ink);}
.search::placeholder{color:var(--ink-3);}
.search:focus{outline:none;border-color:var(--ink);}
.sort{flex-shrink:0;border:1px solid var(--line);border-radius:8px;background:transparent;
  padding:0 8px;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-2);}

/* 詳細シート */
.d-photo{width:100%;height:220px;border-radius:8px;overflow:hidden;background:var(--line-2);
  display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.d-photo img{width:100%;height:100%;object-fit:cover;}
.d-photo .ph{font-size:13px;color:var(--ink-3);font-weight:700;letter-spacing:1px;}
.d-gallery{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;scrollbar-width:none;}
.d-gallery::-webkit-scrollbar{display:none;}
.d-shot{flex:0 0 auto;width:78%;height:220px;border-radius:8px;background:var(--line-2) center/cover no-repeat;}
.d-shop{font-size:12px;color:var(--ink-3);font-weight:600;letter-spacing:.5px;}
.d-shop-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:6px 12px;}
.d-shop-link:active{background:var(--line-2);}
.d-shop-link .map-go{color:var(--ink-3);font-weight:700;font-size:11px;}
.d-menu{font-size:24px;font-weight:900;color:var(--ink);margin-top:3px;line-height:1.3;}
.d-meta{display:flex;align-items:center;gap:10px;margin-top:13px;}
.d-sub{font-size:13px;color:var(--ink-2);margin-top:13px;font-weight:600;}
.d-memo{font-size:15px;color:var(--ink);line-height:1.9;margin-top:18px;
  padding-top:18px;border-top:1px solid var(--line);white-space:pre-wrap;}
.d-actions{display:flex;gap:10px;margin-top:24px;}
.d-edit{flex:1;background:var(--ink);color:var(--paper);border:none;border-radius:10px;
  padding:15px;font-family:inherit;font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;}
.d-del2{flex-shrink:0;padding:15px 18px;background:transparent;color:var(--ink-2);
  border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);font-size:13px;font-weight:700;padding:11px 20px;border-radius:8px;
  opacity:0;transition:.3s;z-index:99;pointer-events:none;letter-spacing:.5px;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
#celebrate{position:fixed;inset:0;pointer-events:none;z-index:120;overflow:hidden;}
.cele{position:absolute;bottom:42%;animation:celePop 1.1s ease-out forwards;}
@keyframes celePop{0%{opacity:0;transform:translate(-50%,0) scale(.4)}20%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),-180px) scale(1.15) rotate(var(--rot))}}
#viewer{position:fixed;inset:0;background:rgba(25,18,22,.93);z-index:200;display:none;align-items:center;justify-content:center;touch-action:none;}
#viewer.on{display:flex;}
#viewerImg{max-width:100%;max-height:100%;transform-origin:center center;will-change:transform;}
#viewerClose{position:absolute;top:calc(env(safe-area-inset-top) + 12px);right:16px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:18px;cursor:pointer;z-index:2;}
.hidden{display:none!important;}

/* ===== コラージュ / スクラップブック ===== */
/* 手書き見出し */
.logo-word,.sheet-title,.card-menu,.d-menu,.stat .v,.empty .e,.post-heading{
  font-family:'Klee One',cursive;letter-spacing:.5px;}
/* ロゴ＝シール */
.logo-badge{background:var(--tape3);color:#fff;border-radius:10px;transform:rotate(-4deg);
  font-family:'Klee One',cursive;box-shadow:0 4px 12px rgba(75,58,64,.18);}
/* カード＝貼った写真風（傾き＋マステ＋影） */
.card-wrap{overflow:visible;margin-bottom:22px;}
.card-wrap:nth-child(3n){transform:rotate(-1.2deg);}
.card-wrap:nth-child(3n+1){transform:rotate(.9deg);}
.card{border:none;border-radius:9px;box-shadow:0 7px 16px rgba(43,40,35,.18);}
.card-wrap::before{content:'';position:absolute;top:-10px;left:26px;width:66px;height:22px;z-index:4;
  background:rgba(217,143,160,.5);transform:rotate(-6deg);box-shadow:0 1px 2px rgba(0,0,0,.08);}
/* 種類/タグ＝シール */
.tchip{background:var(--tape2);color:#fff;border:none;border-radius:9px;transform:rotate(-2deg);box-shadow:0 2px 8px rgba(75,58,64,.12);}
.tagb{background:var(--tape4);color:#fff;}
.stars{color:var(--tape1);}
.star-pick span.on{color:var(--tape1);}
/* ボタン＝シール */
.fab{background:var(--tape3);border-radius:16px;transform:translateX(-50%) rotate(-2deg);box-shadow:0 8px 18px rgba(217,143,160,.4);}
.fab:active{transform:translateX(-50%) rotate(-2deg) scale(.96);}
.save-btn{background:var(--tape3);border-radius:14px;}
.streak-line{background:#fff;border:2px dashed var(--tape3);color:var(--tape3-text);transform:rotate(-.5deg);}

/* ===== アクセシビリティ (WCAG 2.2 AA) ===== */
/* 文字を載せる/文字に使うピンク・モーブはコントラスト確保した派生色へ（雰囲気は維持） */
.logo-badge{background:var(--tape3-deep);}
.tchip{background:var(--tape2);}
.tagb{background:var(--tape4);}
.stars{color:var(--tape1);}
.star-pick span.on{color:var(--tape1);}
.fab{background:var(--tape3-deep);}
.save-btn{background:var(--tape3-deep);}
.card-del{background:var(--tape3-deep);}
.d-edit{background:var(--tape3-deep);}

/* フォーカス可視化 — 全インタラクティブ要素 (2.4.7) */
a,button,input,textarea,select,[tabindex],.fchip,.type-opt,.wchip,.star-pick span{outline:none;}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,
select:focus-visible,[tabindex]:focus-visible,.fchip:focus-visible,.type-opt:focus-visible,
.wchip:focus-visible,.star-pick span:focus-visible,.sr-item:focus-visible,
.empty-cta:focus-visible,.nr-clear:focus-visible{
  outline:3px solid var(--focus);outline-offset:2px;border-radius:6px;}

/* タップ標的 最小44px (2.5.8) */
.gear,.shop-find,.sort{min-width:44px;min-height:44px;}
.fchip,.type-opt,.wchip{min-height:36px;display:inline-flex;align-items:center;}
.star-pick span{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;}
.ps-x,.photo-clear{min-width:32px;min-height:32px;}

/* 動きを抑える指定を尊重 (2.3.3 / 演出 celebrate も停止) */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;}
  #celebrate{display:none!important;}
}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* モーダル/ビューア表示中は背景をロック（スワイプ貫通防止） */
html:has(.mask.on),body:has(.mask.on),html:has(#viewer.on),body:has(#viewer.on){overflow:hidden;}
.sheet{overscroll-behavior:contain;}
.mask{touch-action:none;overscroll-behavior:none;} /* 暗幕もスクロール不可 */

/* ===== モーション層（motion-design / Phase3）=====
   触感のスプリング化。transform/opacity のみ駆動。≤200ms。
   reduced-motion は下のブロックで無効化。will-change は付けっぱなしにしない。 */
/* 押下のスプリング感（タップ標的サイズは不変・scale だけ変える） */
.fchip,.wchip,.type-opt,.pp-opt,.shop-find,.gear,.save-btn,.del-btn,.d-edit,.d-del2,.bk-btn,.nr-clear,.empty-cta{
  transition:transform var(--dur-fast) var(--ease-spring),
             background var(--dur-fast) var(--ease-standard),
             opacity var(--dur-fast) var(--ease-standard),
             box-shadow var(--dur) var(--ease-standard);
}
/* 押下: scale(.94)。戻り(:active 解除)で spring により軽いオーバーシュート感 */
.fchip:active,.wchip:active,.type-opt:active,.pp-opt:active,.shop-find:active,
.gear:active,.save-btn:active,.del-btn:active,.d-edit:active,.d-del2:active,.bk-btn:active{transform:scale(.94);}

/* ★評価タップのポップ（選択時に一瞬 scale 1.25→1 spring） */
@keyframes starPop{0%{transform:scale(1);}40%{transform:scale(1.25);}100%{transform:scale(1);}}
.star-pick span.on{animation:starPop var(--dur) var(--ease-spring);}

/* リストの躍動的な出現（opacity / translateY + spring + stagger 上限8件）。
   既存のカード傾き(rotate)は card-wrap の resting transform なので、出現アニメは内側 .card に当てて干渉を避ける。 */
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
/* fill は none（既定）: 終了後はカードの通常状態へ戻り、スワイプの inline transform を阻害しない */
.list .card-wrap .card{animation:cardIn var(--dur) var(--ease-spring);}
.list .card-wrap:nth-child(2) .card{animation-delay:35ms;}
.list .card-wrap:nth-child(3) .card{animation-delay:70ms;}
.list .card-wrap:nth-child(4) .card{animation-delay:105ms;}
.list .card-wrap:nth-child(5) .card{animation-delay:140ms;}
.list .card-wrap:nth-child(6) .card{animation-delay:175ms;}
.list .card-wrap:nth-child(7) .card{animation-delay:210ms;}
.list .card-wrap:nth-child(8) .card{animation-delay:245ms;}
.list .card-wrap:nth-child(n+9) .card{animation-delay:280ms;}

@media (prefers-reduced-motion: reduce){
  .star-pick span.on,.list .card-wrap .card{animation:none!important;}
}

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms cubic-bezier(.3,0,.8,.15) both; }
::view-transition-new(root){ animation: vtIn 360ms cubic-bezier(.34,1.56,.64,1) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){ ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;} }
</style>
</head>

<script>
// ===== データ =====
// 保存キーは絶対に変えない (変えると既存データが読めなくなる)。
// 構造を変える時は migrate() に移行処理を足す。破壊的変更はしない。
const KEY='cafeLog.v1'
const DATA_VERSION=1
const TYPES=['ドリップコーヒー','エスプレッソ','カフェラテ','カプチーノ','抹茶ラテ','紅茶','チャイ','ココア','スムージー','フラペチーノ','ソーダ/エード','パンケーキ','トースト','ケーキ','その他']

let records=load()
let filter='すべて'
let query='',sortBy='new'
let editId=null
let formPhotos=[]
let exifApplied=false
let dateTouched=false
let formType=null
let formStars=0
let formLat=null,formLng=null,formAddress=''
let formTags=new Set()
let activeTag=null

// 読み込み: 旧形式(配列) / 新形式({version,records}) どちらも受ける = 更新でデータを失わない
function load(){
  try{
    const raw=JSON.parse(localStorage.getItem(KEY))
    if(!raw) return []
    const arr=Array.isArray(raw)?raw:(raw.records||[])
    return migrate(arr)
  }catch(e){return []}
}
// 各レコードに不足フィールドを補う(将来の構造変更にも壊れない)
function migrate(arr){
  return arr.filter(Boolean).map(r=>({
    id:r.id||uid(), menu:r.menu||'', shop:r.shop||'',
    type:r.type||null, stars:r.stars||0,
    price:r.price||'', date:r.date||'', memo:r.memo||'', tags:Array.isArray(r.tags)?r.tags:[],
    // photos = 写真の枚数。実体は IndexedDB の "<id>#<i>" キー。
    // photo(旧dataURL) / hasPhoto(旧単一) は移行処理が消費するため一旦保持。
    photos:(typeof r.photos==='number')?r.photos:(r.hasPhoto?1:0),
    photo:r.photo||null, hasPhoto:!!r.hasPhoto,
    lat:(typeof r.lat==='number')?r.lat:null, lng:(typeof r.lng==='number')?r.lng:null,
    address:r.address||'',
  }))
}
function save(){
  localStorage.setItem(KEY,JSON.stringify({version:DATA_VERSION,records,savedAt:new Date().toISOString()}))
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

const $=id=>document.getElementById(id)

// 同一ページ View Transition ヘルパー（未対応/reduced-motion はそのまま実行＝壊れない）
function withVT(fn){
  if(!document.startViewTransition||matchMedia('(prefers-reduced-motion: reduce)').matches) return fn()
  return document.startViewTransition(fn)
}

// ===== 写真ストレージ (IndexedDB / Blob) =====
// 写真は容量の大きい IndexedDB に保存。localStorage には文字情報のみ。
const IDB_NAME='cafechoDB', IDB_STORE='photos'
let _db=null
function idbOpen(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db)
    const rq=indexedDB.open(IDB_NAME,1)
    rq.onupgradeneeded=()=>{const db=rq.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE)}
    rq.onsuccess=()=>{_db=rq.result;res(_db)}
    rq.onerror=()=>rej(rq.error)
  })
}
async function idbPut(id,blob){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(blob,id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}
async function idbGet(id){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const rq=tx.objectStore(IDB_STORE).get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error)})}
async function idbDel(id){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}

function dataURLtoBlob(d){
  const [head,b64]=d.split(',');const mime=(head.match(/:(.*?);/)||[])[1]||'image/jpeg'
  const bin=atob(b64),arr=new Uint8Array(bin.length)
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i)
  return new Blob([arr],{type:mime})
}
function blobToDataURL(blob){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob)})}
// 写真は "<recordId>#<index>" キーで複数保存
function pkey(id,i){return `${id}#${i}`}

// 画像を縮小して dataURL 化
function resizeToDataURL(file){
  return new Promise(res=>{
    const reader=new FileReader()
    reader.onload=ev=>{
      const img=new Image()
      img.onload=()=>{
        const max=900,scale=Math.min(1,max/Math.max(img.width,img.height))
        const cv=document.createElement('canvas')
        cv.width=img.width*scale;cv.height=img.height*scale
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height)
        res(cv.toDataURL('image/jpeg',0.8))
      }
      img.onerror=()=>res(null)
      img.src=ev.target.result
    }
    reader.readAsDataURL(file)
  })
}

// EXIF の DateTimeOriginal(0x9003) を読んで 'YYYY-MM-DD' を返す。失敗時 null。
async function getExifDate(file){
  try{
    const buf=await file.arrayBuffer()
    const dv=new DataView(buf)
    if(dv.getUint16(0)!==0xFFD8) return null            // JPEGでない
    let off=2
    while(off+4<dv.byteLength){
      const marker=dv.getUint16(off)
      const size=dv.getUint16(off+2)
      if(marker===0xFFE1){                                // APP1
        const start=off+4
        if(dv.getUint32(start)!==0x45786966) break        // "Exif"
        const tiff=start+6
        const le=dv.getUint16(tiff)===0x4949              // II=little / MM=big
        const u16=o=>dv.getUint16(o,le), u32=o=>dv.getUint32(o,le)
        const ifd0=tiff+u32(tiff+4)
        const find=(base,tag)=>{
          const n=u16(base)
          for(let i=0;i<n;i++){const e=base+2+i*12; if(u16(e)===tag) return e}
          return -1
        }
        const exifPtr=find(ifd0,0x8769)
        if(exifPtr<0) return null
        const exifIfd=tiff+u32(exifPtr+8)
        const dt=find(exifIfd,0x9003)                     // DateTimeOriginal
        if(dt<0) return null
        const vOff=tiff+u32(dt+8)                          // ASCII "YYYY:MM:DD HH:MM:SS"
        let s=''
        for(let i=0;i<10;i++){const c=dv.getUint8(vOff+i); if(!c)break; s+=String.fromCharCode(c)}
        const m=s.match(/^(\d{4}):(\d{2}):(\d{2})/)
        return m?`${m[1]}-${m[2]}-${m[3]}`:null
      }
      if((marker&0xFF00)!==0xFF00) break
      off+=2+size
    }
    return null
  }catch(e){return null}
}

// 表示用 objectURL のキャッシュ

// 表示用 objectURL のキャッシュ
const photoURLs={}
async function getPhotoURL(id){
  if(photoURLs[id])return photoURLs[id]
  try{const b=await idbGet(id);if(!b)return null;const u=URL.createObjectURL(b);photoURLs[id]=u;return u}catch(e){return null}
}
function dropPhotoCache(id){if(photoURLs[id]){URL.revokeObjectURL(photoURLs[id]);delete photoURLs[id]}}
// data-pid を持つ要素に写真を非同期で流し込む
function fillPhotos(root){
  root.querySelectorAll('[data-pid]').forEach(async el=>{
    const u=await getPhotoURL(el.dataset.pid)
    if(u){el.style.backgroundImage=`url("${u}")`;el.style.backgroundSize='cover';el.style.backgroundPosition='center';el.classList.remove('ph');const s=el.querySelector('span');if(s)s.remove()}
  })
}
// 起動時: 旧形式の写真を新スキーム("<id>#<i>") へ一度だけ移行
async function migratePhotosV2(){
  let changed=false
  for(const r of records){
    if(typeof r.photo==='string' && r.photo.startsWith('data:')){
      // 旧: localStorage 内 dataURL → IDB #0
      try{ await idbPut(pkey(r.id,0),dataURLtoBlob(r.photo)); r.photos=1; r.photo=null; r.hasPhoto=false; changed=true }catch(e){}
    } else if(r.hasPhoto && !(r.photos>0)){
      // 旧: 単一IDB(key=id) → #0 へ移設
      try{ const b=await idbGet(r.id); if(b){await idbPut(pkey(r.id,0),b);await idbDel(r.id)} r.photos=b?1:0; r.hasPhoto=false; changed=true }catch(e){}
    } else if(r.hasPhoto && r.photos>0){
      r.hasPhoto=false; changed=true
    }
  }
  if(changed){save();render()}
}

function render(){

  $('st-avg').innerHTML=records.length?avg.toFixed(1)+'<small>★</small>':'–'

  if(records.length){
    const c={};records.forEach(r=>{if(r.type)c[r.type]=(c[r.type]||0)+1})

  }else $('st-fav').textContent='–'
  // 連続記録ストリーク

    else{el.style.display='none';el.textContent=''}

  $('filters').innerHTML=fopts.map(f=>`<div class="fchip ${f===filter?'on':''}" data-f="${f}" role="button" tabindex="0" aria-pressed="${f===filter}">${f}</div>`).join('')
  $('filters').querySelectorAll('.fchip').forEach(el=>el.onclick=()=>{filter=el.dataset.f;withVT(()=>render())})

  // タグの絞り込み行
  const allTags=[...new Set(records.flatMap(r=>r.tags||[]))]
  $('tagFilters').innerHTML=allTags.map(t=>`<div class="fchip tag ${t===activeTag?'on':''}" data-t="${esc(t)}" role="button" tabindex="0" aria-pressed="${t===activeTag}">#${esc(t)}</div>`).join('')
  $('tagFilters').querySelectorAll('.fchip').forEach(el=>el.onclick=()=>{activeTag=(activeTag===el.dataset.t)?null:el.dataset.t;withVT(()=>render())})

  let items=records.filter(r=>(filter==='すべて'||r.type===filter)&&(!activeTag||(r.tags||[]).includes(activeTag)))
  if(query){const q=query.toLowerCase();items=items.filter(r=>`${r.menu||''} ${r.shop||''} ${r.memo||''} ${(r.tags||[]).join(' ')}`.toLowerCase().includes(q))}
  items=sortItems(items)
  if(records.length===0){$('empty').classList.remove('hidden');$('list').innerHTML='';return}
  $('empty').classList.add('hidden')
  if(items.length===0){
    // 検索/フィルタ結果0件: 状況文＋「条件をクリア」アクション（filter/activeTag/query をリセット）
    const hasCond=(filter!=='すべて')||activeTag||query
    $('list').innerHTML='<div class="no-result">'
      +'<div class="nr-t">'+(hasCond?'条件に合う記録はなかったよ':'該当する記録がないよ')+'</div>'
      +(hasCond?'<div class="nr-d">絞り込みや検索を見直すか、条件をクリアしてみよう。</div>'
        +'<button type="button" class="nr-clear" id="nrClear">条件をクリア</button>':'')
      +'</div>'
    if(hasCond){
      const b=$('nrClear')
      if(b)b.onclick=()=>{filter='すべて';activeTag=null;query='';$('search').value='';withVT(()=>render())}
    }
    return
  }
  $('list').innerHTML='<div class="list-hint">タップで詳細 ・ 左スワイプ→削除ボタン</div>'+items.map(r=>`
    <div class="card-wrap">
      <div class="card-del">削除</div>
      <div class="card" data-id="${r.id}">
        ${photoCell(r,'card-photo')}
        <div class="card-body">
          <div class="card-shop">${esc(r.shop)||'お店未設定'}</div>
          <div class="card-menu">${esc(r.menu)||'（無題）'}</div>
          <div class="card-meta">
            ${r.type?`<span class="tchip">${esc(r.type)}</span>`:''}
            ${r.stars?starHTML(r.stars):''}
          </div>
          ${(r.tags&&r.tags.length)?`<div class="card-tags">${r.tags.map(t=>`<span class="tagb">#${esc(t)}</span>`).join('')}</div>`:''}
          <div class="card-foot">
            <span class="card-date">${r.date||''}</span>
            ${r.price?`<span class="card-price">¥${Number(r.price).toLocaleString()}</span>`:''}
          </div>
        </div>
      </div>
    </div>`).join('')
  $('list').querySelectorAll('.card').forEach(attachCard)
  fillPhotos($('list'))
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function sortItems(arr){
  const a=[...arr]
  switch(sortBy){
    case 'old':       a.sort((x,y)=>(x.date||'').localeCompare(y.date||''));break
    case 'star':      a.sort((x,y)=>(y.stars||0)-(x.stars||0));break
    case 'priceHigh': a.sort((x,y)=>(Number(y.price)||0)-(Number(x.price)||0));break
    case 'priceLow':  a.sort((x,y)=>(Number(x.price)||0)-(Number(y.price)||0));break
    default:          a.sort((x,y)=>(y.date||'').localeCompare(x.date||'')) // new
  }
  return a
}

// ===== ジェスチャー操作 =====
// カード: タップ=編集 / 左スワイプ=削除
// カード: タップ=詳細 / 左スワイプで「削除」ボタンが出る → それをタップで削除（誤削除防止の2段階）
function attachCard(el){
  const id=el.dataset.id
  const wrap=el.parentElement
  const del=wrap?wrap.querySelector('.card-del'):null
  const OPEN=-84
  let sx=0,sy=0,dx=0,hor=false,open=false
  function setOpen(o){open=o;el.style.transition='transform .2s';el.style.transform=`translateX(${o?OPEN:0}px)`}
  el.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=open?OPEN:0;hor=false;el.style.transition='none'
  },{passive:true})
  el.addEventListener('touchmove',e=>{
    const mx=e.touches[0].clientX-sx,my=e.touches[0].clientY-sy
    if(!hor && Math.abs(mx)>Math.abs(my)+8) hor=true
    if(hor){ e.preventDefault(); dx=Math.max(-100,Math.min(0,(open?OPEN:0)+mx)); el.style.transform=`translateX(${dx}px)` }
  },{passive:false})
  el.addEventListener('touchend',()=>{ if(hor) setOpen(dx<-42) })
  el.addEventListener('click',()=>{ if(hor)return; if(open){setOpen(false);return} openDetail(id) })
  if(del) del.onclick=()=>{ if(open) deleteRecord(id) }
}
function deleteRecord(id){
  const r=records.find(x=>x.id===id); const n=r?(r.photos||0):0
  records=records.filter(x=>x.id!==id);save();render();toast('削除したよ')
  for(let i=0;i<n;i++){dropPhotoCache(pkey(id,i));idbDel(pkey(id,i)).catch(()=>{})}
  dropPhotoCache(id);idbDel(id).catch(()=>{}) // 旧キーも掃除
}

// シート: 下スワイプで閉じる
function makeSwipeable(sheet,onClose){
  let startY=0,cur=0,drag=false
  sheet.addEventListener('touchstart',e=>{
    if(sheet.scrollTop>2){drag=false;return}
    startY=e.touches[0].clientY;cur=0;drag=true;sheet.style.transition='none'
  },{passive:true})
  sheet.addEventListener('touchmove',e=>{
    if(!drag)return
    cur=e.touches[0].clientY-startY
    if(cur>0){sheet.style.transform=`translateY(${cur}px)`}
  },{passive:true})
  sheet.addEventListener('touchend',()=>{
    if(!drag)return
    drag=false;sheet.style.transition=''
    sheet.style.transform=''
    if(cur>100)onClose()
  })
}

// 選択を集約（クリックもキーボードも同じここを呼ぶ＝ロジック二重化しない）
function setType(t){
  formType=t
  const opts=[...$('typeGrid').querySelectorAll('.type-opt')]
  opts.forEach(x=>{const on=x.dataset.t===formType;x.classList.toggle('on',on);x.setAttribute('aria-checked',on?'true':'false')})
  // roving tabindex: 選択中（未選択なら先頭）だけ Tab 到達点に
  const focusT=formType||(opts[0]&&opts[0].dataset.t)
  opts.forEach(x=>{x.tabIndex=(x.dataset.t===focusT)?0:-1})
  renderTagChips() // ジャンルに応じて専用タグを出す
}
// .on クラスから aria-checked / roving tabindex を同期（openAdd/openEdit が直接 .on を操作するため）
function syncTypeAria(){
  const opts=[...$('typeGrid').querySelectorAll('.type-opt')]
  opts.forEach(x=>x.setAttribute('aria-checked',x.classList.contains('on')?'true':'false'))
  const sel=opts.find(x=>x.classList.contains('on'))
  const focusEl=sel||opts[0]
  opts.forEach(x=>{x.tabIndex=(x===focusEl)?0:-1})
}
$('typeGrid').querySelectorAll('.type-opt').forEach(el=>el.onclick=()=>{setType(el.dataset.t);el.focus()})
// キーボード層（左右上下で移動＝即選択・Home/End・Enter/Space で確定）
$('typeGrid').addEventListener('keydown',e=>{
  const opts=[...$('typeGrid').querySelectorAll('.type-opt')]
  let i=opts.findIndex(x=>x.dataset.t===formType); if(i<0)i=0
  let ni=null
  switch(e.key){
    case 'ArrowRight':case 'ArrowDown':ni=Math.min(opts.length-1,i+1);break
    case 'ArrowLeft':case 'ArrowUp':ni=Math.max(0,i-1);break
    case 'Home':ni=0;break
    case 'End':ni=opts.length-1;break
    case 'Enter':case ' ':case 'Spacebar':ni=i;break
    default:return
  }
  e.preventDefault();const tgt=opts[ni];if(tgt){setType(tgt.dataset.t);tgt.focus()}
})

function setStars(v){formStars=Math.max(0,Math.min(5,v|0));paintStars()}
;(()=>{
  const spans=[...$('starPick').querySelectorAll('span')]
  // クリック: 既存どおり値を確定（同じ内部処理を呼ぶだけ）
  spans.forEach(el=>el.addEventListener('click',()=>{setStars(+el.dataset.v);el.focus()}))
  // キーボード層（左右上下/Home/End で増減・Enter/Space で確定。WCAG radiogroup）
  $('starPick').addEventListener('keydown',e=>{
    const cur=formStars||1
    let v=null
    switch(e.key){
      case 'ArrowRight':case 'ArrowUp':v=Math.min(5,cur+1);break
      case 'ArrowLeft':case 'ArrowDown':v=Math.max(1,cur-1);break
      case 'Home':v=1;break
      case 'End':v=5;break
      case 'Enter':case ' ':case 'Spacebar':v=cur;break
      default:return
    }
    e.preventDefault();setStars(v)
    const tgt=spans.find(s=>+s.dataset.v===v);if(tgt)tgt.focus()
  })
})()
function paintStars(){
  $('starPick').querySelectorAll('span').forEach(s=>{

    const focusV=formStars||1
    s.tabIndex=(v===focusV)?0:-1
  })
}

// ===== 写真 (複数 / 撮影・アルバム / EXIFで日付自動) =====
async function handlePhotoFile(file){
  if(!file) return
  // 撮影日(EXIF)は縮小前の元ファイルから読む。最初の1枚で日付欄が空なら自動入力。
  if(!exifApplied){
    const d=await getExifDate(file)
    if(d){ if(!dateTouched) $('f-date').value=d; exifApplied=true }
  }
  const dataURL=await resizeToDataURL(file)
  if(dataURL){ formPhotos.push(dataURL); paintPhoto() }
}

$('libInput').onchange=async e=>{ for(const f of e.target.files){ await handlePhotoFile(f) } e.target.value='' }

async function openEdit(id){
  const r=records.find(x=>x.id===id);if(!r)return
  editId=id;formType=r.type||null;formStars=r.stars||0;formTags=new Set(r.tags||[])
  formLat=(typeof r.lat==='number')?r.lat:null;formLng=(typeof r.lng==='number')?r.lng:null;formAddress=r.address||''
  // 既存写真をフォーム用 dataURL として読み込む
  formPhotos=[]; exifApplied=true; dateTouched=true   // 編集時は日付を自動上書きしない
  for(let i=0;i<(r.photos||0);i++){const b=await idbGet(pkey(id,i)); if(b)formPhotos.push(await blobToDataURL(b))}
  if(!formPhotos.length && r.photo) formPhotos.push(r.photo)  // 移行前フォールバック
  $('sheet-title').textContent='記録を編集'
  $('f-menu').value=r.menu||'';$('f-shop').value=r.shop||''
  $('f-price').value=r.price||'';$('f-memo').value=r.memo||'';$('f-date').value=r.date||todayStr()
  $('typeGrid').querySelectorAll('.type-opt').forEach(x=>x.classList.toggle('on',x.dataset.t===formType))
  syncTypeAria()
  paintStars();paintPhoto();renderTagChips()
  $('shopResults').classList.remove('on');paintShopLoc()
  $('delBtn').classList.remove('hidden')
  $('saveBtn').textContent='更新する';$('saveBtn').disabled=false;setMenuError('')
  showSheet()
}

// インラインエラー制御（f-menu 用）。toast は補助、インラインが主。
function setMenuError(msg){
  const el=$('f-menu-err'),inp=$('f-menu')
  if(!el||!inp)return
  if(msg){el.textContent=msg;el.classList.add('on');inp.setAttribute('aria-invalid','true')}
  else{el.textContent='';el.classList.remove('on');inp.removeAttribute('aria-invalid')}
}

$('saveBtn').onclick=async()=>{
  const menu=$('f-menu').value.trim()
  if(!menu){
    setMenuError('メニュー名を入力してください')
    toast('メニュー名を入れてね')
    $('f-menu').focus()
    return
  }
  setMenuError('')
  // 二重送信防止＋完了サイン: 押下で即無効化。エラー中断時のみ復帰させる。
  const _btn=$('saveBtn'),_label=_btn.textContent
  _btn.disabled=true;_btn.textContent='保存中…'
  const _fail=()=>{_btn.disabled=false;_btn.textContent=_label}
  try{
  const id=editId||uid()
  const isNew=!editId
  // 写真は IndexedDB へ複数保存（localStorage には入れない）
  const oldCount = editId ? ((records.find(r=>r.id===editId)||{}).photos||0) : 0
  try{
    for(let i=0;i<formPhotos.length;i++){ await idbPut(pkey(id,i),dataURLtoBlob(formPhotos[i])); dropPhotoCache(pkey(id,i)) }
    for(let i=formPhotos.length;i<oldCount;i++){ await idbDel(pkey(id,i)); dropPhotoCache(pkey(id,i)) }
  }catch(e){toast('写真の保存に失敗…')}
  const rec={
    id,
    menu, shop:$('f-shop').value.trim(),
    type:formType, stars:formStars,
    price:$('f-price').value.trim(), date:$('f-date').value.trim()||todayStr(),
    memo:$('f-memo').value.trim(), tags:[...formTags],
    photos:formPhotos.length, photo:null,
    lat:formLat, lng:formLng, address:formAddress,
  }
  if(editId){records=records.map(r=>r.id===editId?rec:r);toast('更新したよ')}
  else{records.unshift(rec);toast('記録したよ')}
  try{save()}catch(e){toast('保存に失敗…')}
  hideSheet();render();celebrateTrophies();if(isNew)celebrate()
  }catch(e){ _fail();toast('保存に失敗…') }  // 予期せぬ中断時はボタンを再度有効化
}

// トロフィー: 新規獲得をトーストで祝う
const TROPHY_KEY='cafecho.trophies'
function celebrateTrophies(){
  if(!window.computeAchievements) return
  const all=computeAchievements(records)
  const earned=all.filter(a=>a.earned).map(a=>a.id)
  let seen=[]; try{seen=JSON.parse(localStorage.getItem(TROPHY_KEY)||'[]')}catch(e){}
  const fresh=earned.filter(id=>!seen.includes(id))
  localStorage.setItem(TROPHY_KEY,JSON.stringify(earned))
  fresh.forEach((id,i)=>{const a=all.find(x=>x.id===id); if(a) setTimeout(()=>toast('🏆 '+a.title+' 獲得！'),900+i*1700)})
}

function hideBackup(){$('bkMask').classList.remove('on');$('bkSheet').classList.remove('on')}
async function showStoreStatus(){
  const el=$('storeStatus');if(!el)return
  try{
    const p=navigator.storage&&navigator.storage.persisted?await navigator.storage.persisted():false
    let usage=''
    if(navigator.storage&&navigator.storage.estimate){const e=await navigator.storage.estimate();if(e.usage)usage=` ・ 使用 ${(e.usage/1048576).toFixed(1)}MB`}
    el.textContent=(p?'🔒 永続保存：有効':'⚠ 永続保存：未許可（端末容量不足時に消える可能性）')+usage
  }catch(e){el.textContent=''}
}

$('exportBtn').onclick=async()=>{
  toast('バックアップ作成中…')
  // 写真(IDB)も dataURL として同梱し、単体で復元できるバックアップにする
  const out=[]
  for(const r of records){
    const rec={...r}
    rec.photosData=[]
    for(let i=0;i<(r.photos||0);i++){const b=await idbGet(pkey(r.id,i)); if(b)rec.photosData.push(await blobToDataURL(b))}
    delete rec.photo
    out.push(rec)
  }
  const data={app:'cafecho',version:DATA_VERSION,exportedAt:new Date().toISOString(),records:out}
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a')
  a.href=url;a.download=`cafecho-backup-${todayStr()}.json`
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)
  toast('バックアップを書き出したよ')
}
$('importBtn').onclick=()=>$('importInput').click()
$('importInput').onchange=e=>{
  const file=e.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=async ev=>{
    try{
      const parsed=JSON.parse(ev.target.result)
      const raw=Array.isArray(parsed)?parsed:(parsed.records||[])
      if(!raw.length){toast('読み込めるデータが無かったよ');return}
      // バックアップ内の写真を IndexedDB(#i)へ移す（migrate前に処理：migrateはphotosDataを落とすため）
      for(const r of raw){
        if(Array.isArray(r.photosData)&&r.photosData.length){
          for(let i=0;i<r.photosData.length;i++){try{await idbPut(pkey(r.id,i),dataURLtoBlob(r.photosData[i]));dropPhotoCache(pkey(r.id,i))}catch(e){}}
          r.photos=r.photosData.length
        } else if(typeof r.photo==='string'&&r.photo.startsWith('data:')){
          try{await idbPut(pkey(r.id,0),dataURLtoBlob(r.photo));r.photos=1;dropPhotoCache(pkey(r.id,0))}catch(e){}
        }
        delete r.photosData; r.photo=null
      }
      const incoming=migrate(raw)
      const byId={}
      records.forEach(r=>byId[r.id]=r)
      incoming.forEach(r=>byId[r.id]=r)
      records=Object.values(byId)
      save();render()
      $('bkMask').classList.remove('on');$('bkSheet').classList.remove('on')
      toast(`${incoming.length}件を復元したよ`)
    }catch(err){toast('ファイルを読めなかった…')}
    finally{e.target.value=''}
  }
  reader.readAsText(file)
}

// 写真の全画面ビューア（ピンチズーム / パン / ダブルタップ）
let vScale=1,vx=0,vy=0,_d=0,_sc=1,_sx=0,_sy=0,_tx=0,_ty=0,_mode=null,_lastTap=0
function _applyV(){$('viewerImg').style.transform=`translate(${vx}px,${vy}px) scale(${vScale})`}
function openViewer(src){vScale=1;vx=0;vy=0;$('viewerImg').src=src;_applyV();$('viewer').classList.add('on')}
function closeViewer(){$('viewer').classList.remove('on');$('viewerImg').src=''}
function _dist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
;(function(){
  const v=$('viewer'); if(!v)return
  $('viewerClose').onclick=closeViewer
  v.addEventListener('click',e=>{
    if(e.target.id==='viewerImg'){const now=Date.now();if(now-_lastTap<300){vScale=vScale>1?1:2;vx=0;vy=0;_applyV()}_lastTap=now}
    else closeViewer()
  })
  v.addEventListener('touchstart',e=>{
    if(e.touches.length===2){_mode='pinch';_d=_dist(e);_sc=vScale}
    else if(e.touches.length===1){_mode='pan';_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_tx=vx;_ty=vy}
  },{passive:false})
  v.addEventListener('touchmove',e=>{
    if(_mode==='pinch'&&e.touches.length===2){e.preventDefault();vScale=Math.max(1,Math.min(5,_sc*_dist(e)/_d));_applyV()}
    else if(_mode==='pan'&&e.touches.length===1&&vScale>1){e.preventDefault();vx=_tx+(e.touches[0].clientX-_sx);vy=_ty+(e.touches[0].clientY-_sy);_applyV()}
  },{passive:false})
  v.addEventListener('touchend',e=>{if(e.touches.length===0){_mode=null;if(vScale<=1){vx=0;vy=0;_applyV()}}})
})();

// アクセシビリティ: キーボード操作の補助（既存ロジックは変更せず click を合成するだけ）
document.addEventListener('keydown',e=>{
  const t=e.target
  if((e.key==='Enter'||e.key===' ')&&t&&t.getAttribute&&t.getAttribute('role')==='button'){
    e.preventDefault(); t.click()
  }
  if(e.key==='Escape'){
    const v=$('viewer'); if(v&&v.classList.contains('on')){closeViewer();return}
    document.querySelectorAll('.sheet.on').forEach(s=>{
      if(s.id==='sheet')hideSheet(); else if(s.id==='bkSheet')hideBackup(); else if(s.id==='dSheet')hideDetail()
    })
  }
})
