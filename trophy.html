<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>カフェ日記 トロフィー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="achievements.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--paper:#FBF3EF;--ink:#4B3A40;--ink-2:#6A565D;--ink-3:#7A646F;--line:#EEE0DB;--line-2:#F6ECE8;--card:#FFFFFF;--tape1:#A86A2A;--tape2:#A85C74;--tape3:#D98FA0;--tape4:#7E6796;--tape3-deep:#B35870;--tape3-text:#AE536B;--focus:#7A3A52;}
html,body{height:100%;}
body{font-family:'Zen Maru Gothic','Klee One',sans-serif;color:var(--ink);background-color:var(--paper);background-image:radial-gradient(rgba(43,40,35,.06) 1.2px,transparent 1.2px);background-size:20px 20px;
  min-height:100dvh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px 80px;}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--ink-2);
  text-decoration:none;margin-bottom:18px;}
.title{font-size:26px;font-weight:900;letter-spacing:2px;}
.score{font-size:13px;color:var(--ink-3);margin-top:6px;font-weight:700;letter-spacing:.5px;}
.scorebar{height:8px;border-radius:4px;background:var(--line-2);overflow:hidden;margin:12px 0 4px;}
.scorebar i{display:block;height:100%;background:var(--ink);}
.group-h{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--paper);background:var(--ink);
  display:inline-block;padding:4px 11px;border-radius:5px;margin:28px 0 8px;}
.group-h .grp-n{font-weight:700;opacity:.7;margin-left:4px;}
.tr{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);}
.tr:last-child{border-bottom:none;}
.tr-badge{width:40px;height:40px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:900;border:1.5px solid var(--line);color:var(--ink-3);}
.tr.on .tr-badge{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.tr-body{flex:1;min-width:0;}
.tr-title{font-size:15px;font-weight:800;color:var(--ink-3);}
.tr.on .tr-title{color:var(--ink);}
.tr-desc{font-size:11px;color:var(--ink-3);margin-top:1px;}
.tr-prog{height:5px;border-radius:3px;background:var(--line-2);overflow:hidden;margin-top:7px;}
.tr-prog i{display:block;height:100%;background:var(--ink-3);}
.tr.on .tr-prog i{background:var(--ink);}
.tr-have{flex-shrink:0;font-size:11px;font-weight:700;color:var(--ink-3);min-width:44px;text-align:right;}
.tr.on .tr-have{color:var(--ink);}
.foot{margin-top:30px;text-align:center;font-size:11px;color:var(--ink-3);line-height:1.7;}
.empty-note{font-size:12px;color:var(--ink-3);text-align:center;padding:8px 0 4px;letter-spacing:.5px;}

/* ===== コラージュ アクセント ===== */
.title,.tr-title{font-family:'Klee One',cursive;}
.group-h{background:var(--tape2);transform:rotate(-1deg);}
.scorebar i{background:var(--tape3-text);}
.tr.on .tr-badge{background:var(--tape3-deep);border-color:var(--tape3-deep);color:#fff;}
.tr.on .tr-prog i{background:var(--tape3-text);}

/* ===== アクセシビリティ (WCAG 2.2 AA) ===== */
a:focus-visible,button:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:8px;}
.back{display:inline-flex;min-height:44px;align-items:center;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;}
}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* モーダル/ビューア表示中は背景をロック（スワイプ貫通防止） */
html:has(.mask.on),body:has(.mask.on),html:has(#viewer.on),body:has(#viewer.on){overflow:hidden;}
.sheet{overscroll-behavior:contain;}
.mask{touch-action:none;overscroll-behavior:none;} /* 暗幕もスクロール不可 */

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms cubic-bezier(.3,0,.8,.15) both; }
::view-transition-new(root){ animation: vtIn 360ms cubic-bezier(.34,1.56,.64,1) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){ ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">トロフィー</div>
  <div class="score" id="score"></div>
  <div class="scorebar"><i id="scorebar"></i></div>
  <div id="list"></div>
  <div class="foot">麺を食べて記録すると自動で獲得 ✦</div>
</div>
<script>
const KEY='cafeLog.v1'
function loadRecords(){try{const r=JSON.parse(localStorage.getItem(KEY));if(!r)return[];return Array.isArray(r)?r:(r.records||[])}catch(e){return[]}}
const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

const records=loadRecords()
const ach=(window.computeAchievements?computeAchievements(records):[])
const earnedN=ach.filter(a=>a.earned).length
$('score').textContent=`${earnedN} / ${ach.length} 獲得`
$('scorebar').style.width=ach.length?Math.round(earnedN/ach.length*100)+'%':'0%'

function trItem(a){
  return `<div class="tr ${a.earned?'on':''}">
      <div class="tr-badge">${a.earned?'✓':'🔒'}</div>
      <div class="tr-body">
        <div class="tr-title">${esc(a.title)}</div>
        <div class="tr-desc">${esc(a.desc)}</div>
        <div class="tr-prog"><i style="width:${Math.round(a.pct*100)}%"></i></div>
      </div>
      <div class="tr-have">${a.earned?'獲得':a.have+'/'+a.target}</div>
    </div>`
}
function section(title,items){
  if(!items.length) return ''
  const e=items.filter(a=>a.earned).length
  return `<div class="group-h">${esc(title)} <span class="grp-n">${e}/${items.length}</span></div>`+items.map(trItem).join('')
}
// 総合 → 麺類ごと（各セクションに デビュー/マニア/極み）
const genres=(window.MENCHO_GENRES||[])
let html=section('総合', ach.filter(a=>a.group==='総合'))
genres.forEach(g=>{ html+=section(g, ach.filter(a=>a.id.split(':')[1]===g)) })
// 記録が無くても全トロフィーを一覧表示（目標を眺められる）
$('list').innerHTML = (records.length?'':'<div class="empty-note">まだ記録なし。これが集めるトロフィー一覧 ✦</div>') + html
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
