<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>カフェ日記 用語辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--paper:#FBF3EF;--ink:#4B3A40;--ink-2:#6A565D;--ink-3:#7A646F;--line:#EEE0DB;--line-2:#F6ECE8;--card:#FFFFFF;--tape1:#A86A2A;--tape2:#A85C74;--tape3:#D98FA0;--tape4:#7E6796;--tape3-deep:#B35870;--tape3-text:#AE536B;--focus:#7A3A52;}
html,body{height:100%;scroll-behavior:smooth;}
body{font-family:'Zen Maru Gothic','Klee One',sans-serif;color:var(--ink);background-color:var(--paper);background-image:radial-gradient(rgba(43,40,35,.06) 1.2px,transparent 1.2px);background-size:20px 20px;
  min-height:100dvh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px 80px;}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--ink-2);
  text-decoration:none;margin-bottom:18px;}
.title{font-size:26px;font-weight:900;letter-spacing:2px;}
.sub{font-size:12px;color:var(--ink-3);margin-top:6px;line-height:1.7;letter-spacing:.5px;}

/* 上部クイックジャンプ */
.nav{display:flex;gap:7px;overflow-x:auto;margin:16px -20px 4px;padding:0 20px 2px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-chip{flex-shrink:0;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:12px;
  font-weight:700;color:var(--ink-2);background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit;}
.nav-chip:active{background:var(--ink);color:var(--paper);}

.search{width:100%;background:transparent;border:1px solid var(--line);border-radius:8px;
  padding:11px 14px;font-family:inherit;font-size:14px;color:var(--ink);margin:14px 0 6px;}
.search::placeholder{color:var(--ink-3);}
.search:focus{outline:none;border-color:var(--ink);}
.count{font-size:11px;color:var(--ink-3);margin-bottom:8px;letter-spacing:.5px;}
.group-h{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--paper);background:var(--ink);
  display:inline-block;padding:4px 11px;border-radius:5px;margin:30px 0 6px;scroll-margin-top:14px;}
.term{padding:18px 0;border-bottom:1px solid var(--line);}
.term-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.term-w{font-size:18px;font-weight:900;letter-spacing:.5px;}
.term-r{font-size:12px;color:var(--ink-3);font-weight:600;}
.term-tag{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--paper);background:var(--ink);
  padding:2px 7px;border-radius:4px;}
.term-d{font-size:14px;line-height:1.85;color:var(--ink-2);margin-top:8px;}
.term-d b{color:var(--ink);font-weight:700;}
.none{padding:60px 0;text-align:center;color:var(--ink-3);font-size:14px;}
.foot{margin-top:34px;text-align:center;font-size:11px;color:var(--ink-3);line-height:1.8;}

/* ===== コラージュ アクセント ===== */
.title,.term-w{font-family:'Klee One',cursive;}
.group-h{background:var(--tape2);transform:rotate(-1deg);}
.term-tag{background:var(--tape3-deep);}
.nav-chip:active{background:var(--tape3-deep);border-color:var(--tape3-deep);color:#fff;}

/* ===== アクセシビリティ (WCAG 2.2 AA) ===== */
a:focus-visible,button:focus-visible,input:focus-visible,.nav-chip:focus-visible{
  outline:3px solid var(--focus);outline-offset:2px;border-radius:8px;}
.search:focus{outline:none;border-color:var(--ink);}
.search:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}
.nav-chip{min-height:44px;}
.back{display:inline-flex;min-height:44px;align-items:center;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;}
}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* モーダル/ビューア表示中は背景をロック（スワイプ貫通防止） */
html:has(.mask.on),body:has(.mask.on),html:has(#viewer.on),body:has(#viewer.on){overflow:hidden;}
.sheet{overscroll-behavior:contain;}
.mask{touch-action:none;overscroll-behavior:none;} /* 暗幕もスクロール不可 */

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms cubic-bezier(.3,0,.8,.15) both; }
::view-transition-new(root){ animation: vtIn 360ms cubic-bezier(.34,1.56,.64,1) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){ ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">カフェ日記 用語辞典</div>
  <div class="sub">ドリンクごとの、ちょっとおもしろいカフェ用語あつめ。<br>記録の「タグ」でも使えます。</div>
  <div class="nav" id="nav"></div>
  <input class="search" id="q" type="text" placeholder="用語を検索" autocomplete="off" aria-label="用語を検索">
  <div class="count" id="count" role="status" aria-live="polite"></div>
  <div id="list"></div>
  <div class="foot">カフェ日記 ／ CAFE GLOSSARY<br>※ ここに載っている言葉はだいたい非公式です</div>
</div>

<script>
const GROUPS=[
  {g:'共通', items:[
    {w:'推し', r:'おし', tag:'公式用語', d:'いちばん多く記録しているメニュー（ドリンクもスイーツも）＝あなたの“推し”。トップに表示されます。'},
    {w:'カフェ日記', r:'かふぇにっき', tag:'このアプリ', d:'<b>このアプリ</b>。行ったカフェと一杯を残す、あなたのカフェ年表。'},
    {w:'優勝', r:'ゆうしょう', d:'今日の一杯/一皿が最高だった、という最大級の感想。'},
    {w:'映え', r:'ばえ', d:'写真にしたくなる見た目。ラテアートやパフェなど。'},
    {w:'長居案件', r:'ながいあんけん', d:'居心地が良すぎて何時間でもいられるカフェ。'},
    {w:'リピ確', r:'リピかく', d:'「リピート確定」。また絶対来ると確信した瞬間に成立。'},
    {w:'隠れ家', r:'かくれが', d:'人に教えたくない、自分だけの落ち着くお店。'},
    {w:'ご褒美', r:'ごほうび', d:'頑張った自分へのご褒美カフェ・スイーツ。'},
    {w:'まったり', r:'-', d:'ゆっくり過ごす至福の時間。'},
    {w:'作業はかどる', r:'さぎょうはかどる', d:'集中できて作業が進むカフェ（電源・Wi-Fiありがち）。'},
  ]},
  {g:'コーヒー', items:[
    {w:'深煎り派', r:'ふかいりは', d:'苦み・コクのある深煎りを好む派。'},
    {w:'浅煎り派', r:'あさいりは', d:'フルーティーな酸味の浅煎りを好む派。'},
    {w:'スペシャルティ', r:'-', d:'産地や精製にこだわった高品質なコーヒー。'},
    {w:'ハンドドリップ', r:'-', d:'一杯ずつ手で淹れる、香り高い抽出。'},
    {w:'豆も購入', r:'まめもこうにゅう', d:'気に入って豆まで買って帰るやつ。'},
  ]},
  {g:'エスプレッソ', items:[
    {w:'ショット追加', r:'-', d:'濃さを足すためエスプレッソを1ショット追加。'},
    {w:'クレマ命', r:'クレマいのち', d:'表面の黄金色の泡(クレマ)こそ命、という美学。'},
    {w:'立ち飲み', r:'たちのみ', d:'カウンターでサッと一杯。イタリア式。'},
  ]},
  {g:'カフェラテ', items:[
    {w:'ラテアート', r:'-', d:'ミルクで描く模様。可愛いと優勝。'},
    {w:'オーツミルク', r:'-', d:'植物性ミルクに変更する選択。まろやか。'},
    {w:'甘さ控えめ', r:'あまさひかえめ', d:'シロップ少なめ/無しでミルクの甘みを楽しむ。'},
    {w:'ミルク多め', r:'ミルクおおめ', d:'やさしい味が好きな人の定番カスタム。'},
  ]},
  {g:'抹茶・和', items:[
    {w:'抹茶濃いめ', r:'まっちゃこいめ', d:'抹茶の苦みをしっかり感じたい派。'},
    {w:'和カフェ', r:'わカフェ', d:'和の設えでお茶やあんこを楽しむお店。'},
    {w:'京都気分', r:'きょうときぶん', d:'抹茶スイーツで旅した気分になるやつ。'},
  ]},
  {g:'紅茶・チャイ', items:[
    {w:'茶葉指定', r:'ちゃばしてい', d:'銘柄や産地を選んで頼むこだわり。'},
    {w:'ミルクティー', r:'-', d:'紅茶にミルクを合わせた定番。'},
    {w:'アールグレイ', r:'-', d:'ベルガモットの香り高い紅茶。'},
    {w:'マサラチャイ', r:'-', d:'スパイスを煮出した本格チャイ。'},
  ]},
  {g:'スイーツ', items:[
    {w:'別腹', r:'べつばら', d:'お腹いっぱいでもスイーツは入る現象。'},
    {w:'ふわふわ', r:'-', d:'スフレパンケーキ等の理想の食感。'},
    {w:'あんバター', r:'-', d:'あんこ＋バターの最強トースト。'},
    {w:'季節限定', r:'きせつげんてい', d:'今しか食べられない、という魔法の言葉。'},
  ]},
  {g:'スムージー・ソーダ', items:[
    {w:'ベリー系', r:'ベリーけい', d:'いちご/ミックスベリーの甘酸っぱいやつ。'},
    {w:'グリーン', r:'-', d:'野菜たっぷりのヘルシースムージー。'},
    {w:'レモネード', r:'-', d:'シュワっと爽やかな映えドリンク。'},
    {w:'映え色', r:'ばえいろ', d:'写真が盛れる鮮やかな色合い。'},
  ]},
]

const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// 上部クイックジャンプ
$('nav').innerHTML=GROUPS.map((g,i)=>`<button class="nav-chip" data-i="${i}">${esc(g.g)}</button>`).join('')
$('nav').querySelectorAll('.nav-chip').forEach(b=>b.onclick=()=>{
  $('q').value='';render('')
  const el=document.getElementById('grp-'+b.dataset.i)
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'})
})

function termHTML(t){
  return `<div class="term"><div class="term-h">
    <span class="term-w">${esc(t.w)}</span>
    ${t.r&&t.r!=='-'?`<span class="term-r">${esc(t.r)}</span>`:''}
    ${t.tag?`<span class="term-tag">${esc(t.tag)}</span>`:''}
  </div><div class="term-d">${t.d}</div></div>`
}
function render(q){
  q=(q||'').toLowerCase()
  let any=0,html=''
  GROUPS.forEach((grp,i)=>{
    const items=grp.items.filter(t=>!q||`${t.w} ${t.r} ${t.d} ${grp.g}`.toLowerCase().includes(q))
    if(!items.length)return
    any+=items.length
    html+=`<div class="group-h" id="grp-${i}">${esc(grp.g)}</div>`+items.map(termHTML).join('')
  })
  $('count').textContent=`${any} 語`
  $('list').innerHTML=any?html:'<div class="none">見つからなかった…</div>'
}
$('q').oninput=e=>render(e.target.value.trim())
render('')
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
