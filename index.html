<title>カフェ日記 — カフェの記録</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   カフェ日記 — Material Design 3 reskin（M3 公式トークン準拠）
   モカ/ラテ系シード（primary #7E5539 = コーヒー）＋ ダスティローズ
   (secondary #9C4458) の差し色で「カフェらしさ × ほんのり可愛い」。
   麺帳(橙)とは UIシステムを揃えつつ、配色(茶/クリーム/ローズ)で差別化。
   M3 26カラーロール(light/dark) / type scale(M PLUS 2) /
   角丸スケール / tonal elevation(surface-container) / motion tokens。
   anti-ai-design: 量産Android感を避け、重みのあるワードマークと
   モカ/ローズトーンで「カフェ日記」らしさを出す。
   JS・id・class・データキー(cafeLog.v1 / IndexedDB cafechoDB)は
   一切変更していない（見た目層のみ）。
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  /* === M3 カラーロール（Light・モカ系シード #7E5539） === */
  --md-primary:#7E5539; --md-on-primary:#FFFFFF;
  --md-primary-container:#FFDCC2; --md-on-primary-container:#2D1600;
  --md-secondary:#9C4458; --md-on-secondary:#FFFFFF;
  --md-secondary-container:#FFD9DF; --md-on-secondary-container:#3E0017;
  --md-tertiary:#6B5D2F; --md-on-tertiary:#FFFFFF;
  --md-tertiary-container:#F4E3A6; --md-on-tertiary-container:#211B00;
  --md-error:#BA1A1A; --md-on-error:#FFFFFF;
  --md-error-container:#FFDAD6; --md-on-error-container:#410002;
  --md-surface:#FFF8F4; --md-on-surface:#221A14; --md-on-surface-variant:#51453B;
  --md-surface-container-lowest:#FFFFFF; --md-surface-container-low:#FCF0E8;
  --md-surface-container:#F7EAE0; --md-surface-container-high:#F1E4DA;
  --md-surface-container-highest:#EBDED4;
  --md-outline:#847469; --md-outline-variant:#D6C3B6;
  --md-inverse-surface:#382F28; --md-inverse-on-surface:#FFEDE2; --md-inverse-primary:#F3B98C;
  --md-star:#9C6B07; --md-scrim:rgba(0,0,0,.4);

  /* state layer の重ね色（onColor を不透明度で重ねる） */
  --state-on-surface:34,26,20;       /* on-surface RGB */
  --state-primary:126,85,57;         /* primary RGB */
  --state-secondary:156,68,88;       /* secondary RGB（ローズ差し色） */

  /* 役割エイリアス（旧クラス名がこれを参照） */
  --label:var(--md-on-surface);
  --secondary-label:var(--md-on-surface-variant);
  --tertiary-label:var(--md-outline);
  --bg:var(--md-surface);
  --bg-elevated:var(--md-surface-container-low);
  --separator:var(--md-outline-variant);
  --separator-weak:var(--md-outline-variant);
  --fill:var(--md-surface-container-high);
  --fill-2:var(--md-surface-container);
  --tint:var(--md-primary);
  --tint-weak:var(--md-primary-container);
  --on-tint:var(--md-on-primary);
  --red:var(--md-error);
  --star-off:var(--md-outline-variant);
  --focus:var(--md-primary);

  /* 和文 M PLUS 2（麺帳と統一・M3 plain）。CSP=self のためローカル/プラットフォーム書体にフォールバック。 */
  --font-sys:"M PLUS 2","Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,-apple-system,sans-serif;
  /* M3 角丸スケール */
  --r-xs:4px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:28px;--r-full:999px;
  --r-card:var(--r-md);--r-sheet:var(--r-xl);--r-ctl:var(--r-xs);--r-chip:var(--r-sm);
  /* === M3 motion tokens === */
  --ease-standard:cubic-bezier(.2,0,0,1);
  --ease-decelerate:cubic-bezier(.05,.7,.1,1);   /* Emphasized decelerate（出現） */
  --ease-accelerate:cubic-bezier(.3,0,.8,.15);   /* Emphasized accelerate（退出） */
  --ease-spring:cubic-bezier(.34,1.56,.64,1);    /* 弾むスプリング（押下戻り・★） */
  --dur-fast:200ms;--dur:300ms;--dur-slow:400ms;
}
@media (prefers-color-scheme:dark){
  :root{
    --md-primary:#F3B98C; --md-on-primary:#48280F;
    --md-primary-container:#623E23; --md-on-primary-container:#FFDCC2;
    --md-secondary:#FFB2BF; --md-on-secondary:#5E1129;
    --md-secondary-container:#7C2D40; --md-on-secondary-container:#FFD9DF;
    --md-tertiary:#D7C68C; --md-on-tertiary:#393005;
    --md-tertiary-container:#52461A; --md-on-tertiary-container:#F4E3A6;
    --md-error:#FFB4AB; --md-on-error:#690005;
    --md-error-container:#93000A; --md-on-error-container:#FFDAD6;
    --md-surface:#19120D; --md-on-surface:#EFE0D6; --md-on-surface-variant:#D6C3B6;
    --md-surface-container-lowest:#130C08; --md-surface-container-low:#221A14;
    --md-surface-container:#261D17; --md-surface-container-high:#312720;
    --md-surface-container-highest:#3D322A;
    --md-outline:#9F8C80; --md-outline-variant:#51453B;
    --md-inverse-surface:#EFE0D6; --md-inverse-on-surface:#382F28; --md-inverse-primary:#7E5539;
    --md-star:#F4C95D; --md-scrim:rgba(0,0,0,.55);
    --state-on-surface:239,224,214;
    --state-primary:243,185,140;
    --state-secondary:255,178,191;
  }
}

html,body{height:100%;}
html{background-color:var(--bg);}  /* overscroll時の空白露出を防ぐ（surfaceと一致） */
body{font-family:var(--font-sys);color:var(--label);background-color:var(--bg);
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  font-size:16px;line-height:1.5;letter-spacing:.01em;}  /* M3 Body Large 16px */
.wrap{max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 116px);}

/* グローバル: フォーカスリング & reduced-motion (WCAG 2.4.7 / 2.3) */
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px;}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
}

/* ===== header: M3 Top app bar（ワードマーク「カフェ日記」） =====
   anti-ai: 重め(800)＋詰めた字間でブランドの“顔”を作る。Display Small相当。 */
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin:4px 0 18px;min-height:56px;}
.logo-word{font-size:30px;line-height:38px;font-weight:800;color:var(--md-on-surface);letter-spacing:-.01em;}
.logo-sub{font-size:13px;color:var(--secondary-label);letter-spacing:.3px;margin-top:2px;font-weight:400;}
.head-actions{display:flex;gap:2px;flex-shrink:0;}
/* M3 icon button (standard) 48dp 標的・state layer */
.gear{position:relative;min-width:48px;min-height:48px;width:48px;height:48px;border-radius:var(--r-full);
  border:none;background:transparent;color:var(--md-on-surface-variant);font-size:16px;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;
  transition:background var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.gear::before{content:"";position:absolute;inset:0;border-radius:inherit;
  background:rgb(var(--state-on-surface));opacity:0;transition:opacity var(--dur-fast) var(--ease-standard);}
.gear:hover::before{opacity:.08;}
.gear:focus-visible::before{opacity:.10;}
.gear:active{transform:scale(.90);}
.gear:active::before{opacity:.10;}

/* ===== stats: M3 elevated カード（surface-container-low / tonal） ===== */
.stats{display:flex;background:var(--md-surface-container-low);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:20px;border:1px solid var(--md-outline-variant);}
.stat{flex:1;padding:16px 4px;text-align:center;position:relative;}
.stat + .stat::before{content:'';position:absolute;left:0;top:16px;bottom:16px;width:1px;background:var(--md-outline-variant);}
.stat .v{font-size:24px;font-weight:700;color:var(--md-on-surface);line-height:1.15;font-variant-numeric:tabular-nums;}
.stat .v small{font-size:13px;font-weight:600;color:var(--md-on-surface-variant);margin-left:1px;}
.stat .l{font-size:12px;color:var(--md-on-surface-variant);margin-top:6px;font-weight:500;letter-spacing:.4px;}

/* ストリーク: secondary-container（ローズ差し色）の控えめバー */
.streak-line{display:none;text-align:center;font-size:15px;font-weight:600;color:var(--md-on-secondary-container);
  background:var(--md-secondary-container);border-radius:var(--r-md);padding:12px;margin-bottom:16px;letter-spacing:.2px;}

/* ===== filter / tag: M3 filter chip（state layer・選択=secondary-container） ===== */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fchip{position:relative;flex-shrink:0;min-height:32px;padding:6px 16px;border-radius:var(--r-sm);
  font-size:14px;font-weight:500;letter-spacing:.1px;cursor:pointer;display:inline-flex;align-items:center;overflow:hidden;
  background:transparent;color:var(--md-on-surface-variant);border:1px solid var(--md-outline);
  transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard),
             border-color var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.fchip::before{content:"";position:absolute;inset:0;background:rgb(var(--state-on-surface));opacity:0;transition:opacity var(--dur-fast) var(--ease-standard);}
.fchip:hover::before{opacity:.08;}
.fchip:active{transform:scale(.95);}
.fchip.on{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border-color:transparent;}
.fchip.on::before{background:rgb(var(--state-on-surface));}
.fchip.tag{font-size:14px;}
.fchip.tag.on{background:var(--md-secondary-container);color:var(--md-on-secondary-container);}
#tagFilters{margin-top:-4px;}
#tagFilters:empty{display:none;}

/* タグのバッジ（assist chip 風・低強調） */
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.tagb{font-size:12px;font-weight:500;color:var(--md-on-surface-variant);background:var(--md-surface-container-high);border-radius:var(--r-sm);padding:3px 9px;}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}

/* ===== list: 写真主役のカード（surface-container-low・薄い境界・角丸） ===== */
.list{display:flex;flex-direction:column;gap:12px;}
.list-hint{font-size:13px;color:var(--tertiary-label);text-align:center;margin-bottom:12px;letter-spacing:.2px;}
/* 検索/フィルタ結果0件の親切な空状態（条件クリア導線つき） */
.no-result{text-align:center;padding:48px 24px;}
.no-result .nr-t{font-size:16px;font-weight:600;color:var(--md-on-surface-variant);}
.no-result .nr-d{font-size:14px;color:var(--md-on-surface-variant);margin-top:8px;line-height:1.6;}
/* M3 tonal button */
.nr-clear{margin-top:18px;background:var(--md-secondary-container);color:var(--md-on-secondary-container);border:none;border-radius:var(--r-full);
  padding:10px 24px;font-family:inherit;font-size:14px;font-weight:500;letter-spacing:.1px;cursor:pointer;min-height:44px;
  transition:filter var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.nr-clear:hover{filter:brightness(.96);}
.nr-clear:active{transform:scale(.92);}
.card-wrap{position:relative;border-radius:var(--r-md);overflow:hidden;}
/* 2段階スワイプ削除: 露出ボタンは error ロール */
.card-del{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;cursor:pointer;
  padding-right:24px;background:var(--md-error);color:var(--md-on-error);font-weight:600;font-size:15px;letter-spacing:.3px;border-radius:var(--r-md);}
/* M3 filled card：surface-container-low + tonal、影は控えめ（高さは面色で表現） */
.card{display:flex;background:var(--md-surface-container-low);border:1px solid var(--md-outline-variant);border-radius:var(--r-md);
  overflow:hidden;cursor:pointer;position:relative;touch-action:pan-y;
  transition:transform .18s var(--ease-standard), opacity .16s var(--ease-standard), background var(--dur-fast) var(--ease-standard);}
.card:hover{background:var(--md-surface-container);}
.card:active{transform:translateX(0) scale(.99);}
.card-photo{width:104px;flex-shrink:0;align-self:stretch;object-fit:cover;min-height:112px;position:relative;}
.card-photo.ph{background:var(--md-surface-container-high);display:flex;align-items:center;justify-content:center;}
.photo-n{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;
  font-weight:600;padding:2px 7px;border-radius:8px;font-style:normal;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.card-photo.ph span{font-size:13px;color:var(--md-on-surface-variant);font-weight:500;letter-spacing:.3px;}
.card-body{flex:1;padding:13px 15px;min-width:0;display:flex;flex-direction:column;}
.card-shop{font-size:14px;color:var(--md-on-surface-variant);font-weight:400;letter-spacing:.1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-menu{font-size:18px;font-weight:700;color:var(--md-on-surface);margin-top:1px;line-height:1.3;letter-spacing:-.005em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:8px;}
/* タイプチップ = primary-container（モカの差し色） */
.tchip{font-size:12px;font-weight:600;color:var(--md-on-primary-container);background:var(--md-primary-container);border:none;
  padding:3px 10px;border-radius:var(--r-sm);letter-spacing:.2px;}
.stars{font-size:14px;color:var(--md-star);letter-spacing:1px;}
.stars .off{color:var(--star-off);}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;}
.card-date{font-size:13px;color:var(--md-on-surface-variant);letter-spacing:.1px;font-variant-numeric:tabular-nums;}
.card-price{font-size:15px;font-weight:600;color:var(--md-on-surface);font-variant-numeric:tabular-nums;}

/* ===== empty: ワードマーク的に静かに ===== */
.empty{text-align:center;padding:96px 24px;color:var(--md-on-surface-variant);}
.empty .e{font-size:34px;font-weight:800;color:var(--md-outline-variant);letter-spacing:.04em;margin-bottom:16px;}
.empty .t{font-size:18px;font-weight:700;color:var(--md-on-surface);}
.empty .d{font-size:15px;margin-top:10px;line-height:1.7;color:var(--md-on-surface-variant);}
/* 空状態のオンボーディングCTA = M3 filled button（primary） */
.empty-cta{margin-top:26px;background:var(--md-primary);color:var(--md-on-primary);border:none;border-radius:var(--r-full);
  padding:14px 28px;font-family:inherit;font-size:16px;font-weight:600;letter-spacing:.1px;cursor:pointer;min-height:48px;
  transition:transform var(--dur-fast) var(--ease-spring),filter var(--dur) var(--ease-standard);}
.empty-cta:hover{filter:brightness(1.06);}
.empty-cta:active{transform:scale(.92);}

/* ===== Extended FAB「＋記録する」: primary-container・Large角丸16・elevation level3 ===== */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 20px);
  min-height:56px;background:var(--md-primary-container);color:var(--md-on-primary-container);border:none;border-radius:var(--r-lg);
  padding:16px 22px;font-family:inherit;font-size:16px;font-weight:600;letter-spacing:.1px;cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.12);z-index:40;overflow:hidden;
  transition:transform .12s var(--ease-spring), box-shadow .15s var(--ease-standard);}
.fab::before{content:"";position:absolute;inset:0;background:rgb(var(--state-primary));opacity:0;transition:opacity var(--dur-fast) var(--ease-standard);}
.fab:hover{box-shadow:0 6px 12px rgba(0,0,0,.22),0 2px 4px rgba(0,0,0,.14);}
.fab:hover::before{opacity:.08;}
.fab:active{transform:translateX(-50%) scale(.96);}

/* ===== sheet: M3 ボトムシート（Extra-large 28 上端・surface-container-high・scrim・overshoot無し） ===== */
.mask{position:fixed;inset:0;background:var(--md-scrim);opacity:0;visibility:hidden;transition:opacity var(--dur) var(--ease-standard),visibility var(--dur);z-index:50;}
.mask.on{opacity:1;visibility:visible;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--md-surface-container-high);
  border-radius:var(--r-xl) var(--r-xl) 0 0;z-index:51;transform:translateY(100%);
  /* Emphasized decelerate（出現）— overshoot無し。下に空白が出る不具合を回避。 */
  transition:transform var(--dur-slow) var(--ease-decelerate);max-height:92dvh;overflow-y:auto;
  padding:0 20px calc(env(safe-area-inset-bottom) + 24px);
  box-shadow:0 -2px 12px rgba(0,0,0,.16);}
.sheet.on{transform:none;}
.grip{width:32px;height:4px;border-radius:var(--r-full);background:var(--md-outline-variant);margin:14px auto 6px;}
.sheet-title{font-size:22px;font-weight:700;letter-spacing:0;margin:8px 0 22px;color:var(--md-on-surface);}

/* photo picker（M3 surface-container 面） */
.photo-pick{width:100%;min-height:120px;border-radius:var(--r-md);
  background:var(--md-surface-container);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:14px;margin-bottom:22px;}
.photo-strip{display:flex;gap:8px;width:100%;overflow-x:auto;scrollbar-width:none;}
.photo-strip::-webkit-scrollbar{display:none;}
.ps-thumb{flex:0 0 auto;width:78px;height:78px;border-radius:var(--r-md);position:relative;
  background:var(--md-surface-container-highest) center/cover no-repeat;}
.ps-x{position:absolute;top:-7px;right:-7px;min-width:24px;min-height:24px;width:24px;height:24px;border-radius:50%;border:2px solid var(--md-surface-container);
  background:var(--md-error);color:var(--md-on-error);font-size:12px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;
  transition:transform var(--dur-fast) var(--ease-spring);}
.ps-x:active{transform:scale(.85);}
.pp-empty{display:flex;gap:12px;}
/* M3 outlined button 風 */
.pp-opt{background:transparent;border:1px solid var(--md-outline);border-radius:var(--r-md);
  padding:14px 22px;font-family:inherit;font-size:14px;font-weight:600;color:var(--md-primary);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;min-width:100px;min-height:48px;
  transition:background var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.pp-opt:hover{background:var(--md-surface-container-high);}
.pp-opt:active{transform:scale(.97);}
.pp-ico{font-size:24px;}
.photo-clear{position:absolute;top:8px;right:8px;background:var(--md-scrim);color:#fff;border:none;
  min-width:28px;min-height:28px;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;z-index:2;}

/* ===== fields: M3 filled text field（Extra-small 4 上角・下端インジケータ） ===== */
.field{margin-bottom:20px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--md-on-surface-variant);
  margin-bottom:8px;letter-spacing:.1px;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea{
  width:100%;background:var(--md-surface-container-highest);border:none;
  border-bottom:1px solid var(--md-on-surface-variant);border-radius:var(--r-xs) var(--r-xs) 0 0;
  padding:12px 14px;font-family:inherit;font-size:16px;color:var(--md-on-surface);min-height:48px;
  transition:border-color .15s var(--ease-standard),box-shadow .15s var(--ease-standard);}
.field input::placeholder,.field textarea::placeholder{color:var(--md-outline);}
.field input:focus,.field textarea:focus{outline:none;border-bottom-color:var(--md-primary);box-shadow:inset 0 -1px 0 0 var(--md-primary);}
.field input:focus-visible,.field textarea:focus-visible{outline:3px solid var(--focus);outline-offset:1px;}
.field textarea{resize:none;min-height:64px;line-height:1.5;}
/* 邪魔しないバリデーション: 入力途中では怒らず、確定(フォーカスアウト)後に下端を error 色に。 */
.field input:user-invalid{border-bottom-color:var(--md-error);box-shadow:inset 0 -1px 0 0 var(--md-error);}
.field input[aria-invalid="true"]{border-bottom-color:var(--md-error);box-shadow:inset 0 -1px 0 0 var(--md-error);}
/* インラインエラー(該当欄のすぐ下)。行高を確保しレイアウトシフトを抑える。 */
.field-err{min-height:18px;margin-top:6px;font-size:13px;font-weight:500;color:var(--md-error);
  letter-spacing:.1px;opacity:0;transition:opacity var(--dur-fast) var(--ease-standard);}
.field-err.on{opacity:1;}
@media (prefers-reduced-motion:reduce){.field-err{transition:none;}}
.row2{display:flex;gap:14px;}
.row2 .field{flex:1;}

/* 店名検索 (OSM) */
.shop-row{display:flex;gap:10px;align-items:stretch;}
.shop-row input{flex:1;width:auto;}
/* M3 tonal button */
.shop-find{flex-shrink:0;border:none;background:var(--md-secondary-container);border-radius:var(--r-full);
  padding:0 20px;min-height:48px;font-family:inherit;font-size:14px;font-weight:600;color:var(--md-on-secondary-container);cursor:pointer;
  transition:filter var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.shop-find:hover{filter:brightness(.96);}
.shop-find:active{transform:scale(.95);}
.shop-results{display:none;flex-direction:column;background:var(--md-surface-container-highest);border:1px solid var(--md-outline-variant);border-radius:var(--r-md);overflow:hidden;margin-top:10px;}
.shop-results.on{display:flex;}
.sr-item{padding:12px 14px;border-bottom:1px solid var(--md-outline-variant);cursor:pointer;min-height:48px;transition:background .12s var(--ease-standard);}
.sr-item:last-child{border-bottom:none;}
.sr-item:active{background:var(--md-surface-container);}
.sr-name{font-size:16px;font-weight:500;color:var(--md-on-surface);}
.sr-addr{font-size:13px;color:var(--md-on-surface-variant);margin-top:2px;}
.shop-loc{display:none;font-size:13px;color:var(--md-on-surface-variant);font-weight:500;margin-top:8px;}
.shop-loc.on{display:block;}

.word-hint{font-size:13px;color:var(--md-on-surface-variant);margin-top:8px;font-weight:400;letter-spacing:.1px;}
.word-hint a{color:var(--md-primary);text-decoration:none;font-weight:500;}
.word-hint a:hover{text-decoration:underline;}
.word-chips{display:flex;gap:8px;overflow-x:auto;margin-top:10px;padding-bottom:4px;scrollbar-width:none;}
.word-chips::-webkit-scrollbar{display:none;}
/* M3 input/filter chip */
.wchip{flex-shrink:0;border:1px solid var(--md-outline);border-radius:var(--r-sm);padding:7px 14px;min-height:36px;
  font-size:14px;font-weight:500;color:var(--md-on-surface-variant);background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.wchip:hover{background:var(--md-surface-container-high);}
.wchip:active{transform:scale(.95);}
.wchip.on{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border-color:transparent;}

.type-grid{display:flex;flex-wrap:wrap;gap:8px;}
.type-opt{padding:8px 16px;min-height:40px;border-radius:var(--r-sm);font-size:14px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;background:transparent;color:var(--md-on-surface-variant);border:1px solid var(--md-outline);
  transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.type-opt:hover{background:var(--md-surface-container-high);}
.type-opt:active{transform:scale(.95);}
.type-opt.on{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border-color:transparent;}

.star-pick{display:flex;gap:6px;}
.star-pick span{font-size:36px;line-height:1;color:var(--star-off);cursor:pointer;
  min-width:48px;min-height:48px;display:inline-flex;align-items:center;justify-content:center;transition:transform .1s;}
.star-pick span.on{color:var(--md-star);}
.star-pick span:active{transform:scale(1.18);}

/* M3 filled button（primary） */
.save-btn{width:100%;background:var(--md-primary);color:var(--md-on-primary);border:none;border-radius:var(--r-full);
  padding:16px;font-family:inherit;font-size:16px;font-weight:600;letter-spacing:.1px;cursor:pointer;margin-top:8px;min-height:52px;
  transition:transform .1s var(--ease-spring),filter .15s var(--ease-standard);}
.save-btn:hover{filter:brightness(1.06);}
.save-btn:active{transform:scale(.98);}
.save-btn:disabled{opacity:.5;cursor:default;transform:none;filter:none;}
/* M3 text button（error） */
.del-btn{width:100%;background:transparent;color:var(--md-error);border:none;border-radius:var(--r-full);
  padding:14px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;min-height:48px;
  transition:background var(--dur-fast) var(--ease-standard);}
.del-btn:hover{background:var(--md-error-container);}
.del-btn:active{filter:brightness(.95);}

/* backup */
.store-status{margin-top:10px;font-size:13px;font-weight:500;color:var(--md-on-surface);}
.bk-info{font-size:14px;color:var(--md-on-surface-variant);line-height:1.7;background:var(--md-surface-container);
  border-radius:var(--r-md);padding:14px 16px;margin-bottom:18px;}
.bk-info b{color:var(--md-on-surface);font-weight:600;}
/* M3 tonal button */
.bk-btn{width:100%;border:none;background:var(--md-secondary-container);border-radius:var(--r-full);
  padding:15px;font-family:inherit;font-size:15px;font-weight:600;color:var(--md-on-secondary-container);cursor:pointer;min-height:52px;
  margin-bottom:10px;display:flex;align-items:center;gap:10px;justify-content:center;letter-spacing:.1px;
  transition:filter var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-spring);}
.bk-btn:hover{filter:brightness(.96);}
.bk-btn:active{transform:scale(.99);}
.bk-btn .bi{font-size:17px;}

/* toolbar: 検索（M3 filled text field 風）+ 並び替え */
.toolbar{display:flex;gap:8px;margin-bottom:14px;}
.search{flex:1;min-width:0;background:var(--md-surface-container-high);border:none;
  border-bottom:1px solid var(--md-on-surface-variant);border-radius:var(--r-xs) var(--r-xs) 0 0;
  padding:11px 16px;font-family:inherit;font-size:16px;color:var(--md-on-surface);min-height:48px;
  transition:border-color .15s var(--ease-standard),box-shadow .15s var(--ease-standard);}
.search::placeholder{color:var(--md-outline);}
.search:focus{outline:none;border-bottom-color:var(--md-primary);box-shadow:inset 0 -1px 0 0 var(--md-primary);}
.sort{flex-shrink:0;border:none;border-radius:var(--r-xs) var(--r-xs) 0 0;background:var(--md-surface-container-high);
  border-bottom:1px solid var(--md-on-surface-variant);
  padding:0 10px;min-height:48px;font-family:inherit;font-size:14px;font-weight:600;color:var(--md-on-surface-variant);cursor:pointer;}
.sort:focus{outline:none;}
/* キーボードフォーカスは必ず可視化（WCAG 2.4.7）。マウス/タッチの :focus 抑制は維持 */
.search:focus-visible,.sort:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}

/* 詳細シート */
.d-photo{width:100%;height:230px;border-radius:var(--r-lg);overflow:hidden;background:var(--md-surface-container);
  display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.d-photo img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;}
.d-photo .ph{font-size:15px;color:var(--md-on-surface-variant);font-weight:500;letter-spacing:.3px;}
.d-gallery{display:flex;gap:10px;overflow-x:auto;margin-bottom:18px;scrollbar-width:none;}
.d-gallery::-webkit-scrollbar{display:none;}
.d-shot{flex:0 0 auto;width:80%;height:230px;border-radius:var(--r-lg);background:var(--md-surface-container) center/cover no-repeat;cursor:zoom-in;}
.d-shop{font-size:15px;color:var(--md-on-surface-variant);font-weight:400;letter-spacing:.1px;}
/* M3 tonal/assist chip 風リンク */
.d-shop-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--md-on-secondary-container);
  background:var(--md-secondary-container);border:none;border-radius:var(--r-full);padding:9px 16px;min-height:44px;font-weight:600;font-size:14px;
  transition:filter var(--dur-fast) var(--ease-standard);}
.d-shop-link:hover{filter:brightness(.96);}
.d-shop-link:active{filter:brightness(.92);}
.d-shop-link .map-go{color:var(--md-on-secondary-container);font-weight:400;font-size:13px;opacity:.75;}
.d-menu{font-size:28px;font-weight:700;color:var(--md-on-surface);margin-top:6px;line-height:1.2;letter-spacing:-.01em;}
.d-meta{display:flex;align-items:center;gap:10px;margin-top:14px;}
.d-sub{font-size:15px;color:var(--md-on-surface-variant);margin-top:13px;font-weight:400;font-variant-numeric:tabular-nums;}
.d-memo{font-size:16px;color:var(--md-on-surface);line-height:1.7;margin-top:18px;
  padding-top:18px;border-top:1px solid var(--md-outline-variant);white-space:pre-wrap;}
.d-actions{display:flex;gap:10px;margin-top:24px;}
/* M3 filled button */
.d-edit{flex:1;background:var(--md-primary);color:var(--md-on-primary);border:none;border-radius:var(--r-full);
  padding:15px;font-family:inherit;font-size:16px;font-weight:600;letter-spacing:.1px;cursor:pointer;min-height:52px;
  transition:transform .1s var(--ease-spring),filter .15s var(--ease-standard);}
.d-edit:hover{filter:brightness(1.06);}
.d-edit:active{transform:scale(.98);}
/* M3 tonal button（error-container） */
.d-del2{flex-shrink:0;padding:15px 22px;background:var(--md-error-container);color:var(--md-on-error-container);
  border:none;border-radius:var(--r-full);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;min-height:52px;
  transition:filter var(--dur-fast) var(--ease-standard);}
.d-del2:hover{filter:brightness(.97);}
.d-del2:active{filter:brightness(.93);}

/* toast = M3 Snackbar（inverse-surface / inverse-on-surface） */
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 92px);transform:translateX(-50%) translateY(20px);
  background:var(--md-inverse-surface);color:var(--md-inverse-on-surface);font-size:14px;font-weight:500;padding:14px 20px;border-radius:var(--r-xs);
  opacity:0;transition:opacity .3s var(--ease-standard),transform .3s var(--ease-standard);z-index:99;pointer-events:none;letter-spacing:.1px;
  box-shadow:0 4px 8px rgba(0,0,0,.2);max-width:88vw;text-align:center;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

#celebrate{position:fixed;inset:0;pointer-events:none;z-index:120;overflow:hidden;}
.cele{position:absolute;bottom:42%;animation:celePop 1.1s ease-out forwards;}
@keyframes celePop{0%{opacity:0;transform:translate(-50%,0) scale(.4)}20%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),-180px) scale(1.15) rotate(var(--rot))}}

#viewer{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:none;align-items:center;justify-content:center;touch-action:none;}
#viewer.on{display:flex;}
#viewerImg{max-width:100%;max-height:100%;transform-origin:center center;will-change:transform;}
#viewerClose{position:absolute;top:calc(env(safe-area-inset-top) + 12px);right:16px;min-width:48px;min-height:48px;width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:18px;cursor:pointer;z-index:2;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:transform var(--dur-fast) var(--ease-spring),background var(--dur-fast) var(--ease-standard);}
#viewerClose:hover{background:rgba(255,255,255,.28);}
#viewerClose:active{transform:scale(.88);}
.hidden{display:none!important;}

/* スクリーンリーダー専用 */
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* モーダル/ビューア表示中は背景をロック（スワイプ貫通防止） */
html:has(.mask.on),body:has(.mask.on),html:has(#viewer.on),body:has(#viewer.on){overflow:hidden;}
.sheet{overscroll-behavior:contain;}
.mask{touch-action:none;overscroll-behavior:none;} /* 暗幕もスクロール不可 */

/* ===== モーション層（motion-design / M3 spring）=====
   触感のスプリング化と出現アニメ。transform/opacity のみ駆動。
   上部の reduced-motion ブロックが animation/transition を無効化するため自動でオフ。
   will-change は付けっぱなしにしない（押下/出現の一過性のみ）。 */
/* 押下のスプリング感（タップ標的サイズは不変・scale だけ変える） */
.fchip,.wchip,.type-opt,.pp-opt,.shop-find,.gear,.save-btn,.del-btn,.d-edit,.d-del2,.bk-btn,.nr-clear,.empty-cta,.fab,.card{
  transition:transform var(--dur-fast) var(--ease-spring),
             background var(--dur-fast) var(--ease-standard),
             opacity var(--dur-fast) var(--ease-standard),
             box-shadow var(--dur) var(--ease-standard);
}
/* 押下: scale(.92)。戻り(:active 解除)で spring により軽いオーバーシュート感 */
.fchip:active,.wchip:active,.type-opt:active,.pp-opt:active,.shop-find:active,
.gear:active,.save-btn:active,.del-btn:active,.d-edit:active,.d-del2:active,.bk-btn:active{transform:scale(.92);}

/* ★評価タップのポップ（選択時に一瞬 scale 1.3→1 spring） */
@keyframes starPop{0%{transform:scale(1);}40%{transform:scale(1.3);}100%{transform:scale(1);}}
.star-pick span.on{animation:starPop var(--dur) var(--ease-spring);}

/* リストの躍動的な出現（opacity / translateY + spring + stagger 上限8件）。
   出現アニメは内側 .card に当て、card-wrap のスワイプ inline transform を阻害しない。 */
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
/* fill は none（既定）: 終了後はカードの通常状態へ戻り、スワイプの inline transform を阻害しない */
.list .card-wrap .card{animation:cardIn var(--dur) var(--ease-spring);}
.list .card-wrap:nth-child(2) .card{animation-delay:35ms;}
.list .card-wrap:nth-child(3) .card{animation-delay:70ms;}
.list .card-wrap:nth-child(4) .card{animation-delay:105ms;}
.list .card-wrap:nth-child(5) .card{animation-delay:140ms;}
.list .card-wrap:nth-child(6) .card{animation-delay:175ms;}
.list .card-wrap:nth-child(7) .card{animation-delay:210ms;}
.list .card-wrap:nth-child(8) .card{animation-delay:245ms;}
.list .card-wrap:nth-child(n+9) .card{animation-delay:280ms;}

/* FAB: 表示時の軽い bounce-in（scale .8→1 spring）。
   translateX(-50%) を全 keyframe に内包し、resting transform を壊さない。 */
@keyframes fabIn{
  0%{opacity:0;transform:translateX(-50%) scale(.8);}
  60%{opacity:1;transform:translateX(-50%) scale(1.06);}
  100%{opacity:1;transform:translateX(-50%) scale(1);}
}
.fab{animation:fabIn var(--dur-slow) var(--ease-spring);}
.fab:active{transform:translateX(-50%) scale(.96);}

@media (prefers-reduced-motion: reduce){
  .star-pick span.on,.list .card-wrap .card,.fab{animation:none!important;}
}

/* ページ間のなめらか遷移（クロス/同一ドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms var(--ease-accelerate) both; }
::view-transition-new(root){ animation: vtIn 360ms var(--ease-spring) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){
  ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;}
  ::view-transition-old(root),::view-transition-new(root){animation:none!important;}
}

/* 起動時の軽量スケルトン: render() 完了で実カードに差し替わる。
   行高はカードと揃えてレイアウトシフト防止・M3 面色/角丸に合わせる。 */
.sk-list{display:flex;flex-direction:column;gap:12px;}
.sk-card{display:flex;gap:12px;background:var(--md-surface-container-low);border:1px solid var(--md-outline-variant);border-radius:var(--r-md);
  padding:12px;min-height:88px;align-items:center;}
.sk-thumb{width:78px;height:78px;border-radius:var(--r-sm);flex-shrink:0;}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:10px;}
.sk-bar{height:12px;border-radius:var(--r-full);}
.sk-bar.w40{width:40%;}.sk-bar.w70{width:70%;height:16px;}.sk-bar.w30{width:30%;}
.sk-thumb,.sk-bar{background:var(--md-surface-container-high);animation:skPulse 1.1s var(--ease-standard) infinite;}
@keyframes skPulse{0%,100%{opacity:1;}50%{opacity:.55;}}
@media (prefers-reduced-motion: reduce){
  .sk-thumb,.sk-bar{animation:none;}
}

<script>
// ===== データ =====
// 保存キーは絶対に変えない (変えると既存データが読めなくなる)。
// 構造を変える時は migrate() に移行処理を足す。破壊的変更はしない。
const KEY='cafeLog.v1'
const DATA_VERSION=1
const TYPES=['ドリップコーヒー','エスプレッソ','カフェラテ','カプチーノ','抹茶ラテ','紅茶','チャイ','ココア','スムージー','フラペチーノ','ソーダ/エード','パンケーキ','トースト','ケーキ','その他']

let records=load()
let filter='すべて'
let query='',sortBy='new'
let editId=null
let formPhotos=[]
let exifApplied=false
let dateTouched=false
let formType=null
let formStars=0
let formLat=null,formLng=null,formAddress=''
let formTags=new Set()
let activeTag=null

// 読み込み: 旧形式(配列) / 新形式({version,records}) どちらも受ける = 更新でデータを失わない
function load(){
  try{
    const raw=JSON.parse(localStorage.getItem(KEY))
    if(!raw) return []
    const arr=Array.isArray(raw)?raw:(raw.records||[])
    return migrate(arr)
  }catch(e){return []}
}
// 各レコードに不足フィールドを補う(将来の構造変更にも壊れない)
function migrate(arr){
  return arr.filter(Boolean).map(r=>({
    id:r.id||uid(), menu:r.menu||'', shop:r.shop||'',
    type:r.type||null, stars:r.stars||0,
    price:r.price||'', date:r.date||'', memo:r.memo||'', tags:Array.isArray(r.tags)?r.tags:[],
    // photos = 写真の枚数。実体は IndexedDB の "<id>#<i>" キー。
    // photo(旧dataURL) / hasPhoto(旧単一) は移行処理が消費するため一旦保持。
    photos:(typeof r.photos==='number')?r.photos:(r.hasPhoto?1:0),
    photo:r.photo||null, hasPhoto:!!r.hasPhoto,
    lat:(typeof r.lat==='number')?r.lat:null, lng:(typeof r.lng==='number')?r.lng:null,
    address:r.address||'',
  }))
}
function save(){
  localStorage.setItem(KEY,JSON.stringify({version:DATA_VERSION,records,savedAt:new Date().toISOString()}))
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

const $=id=>document.getElementById(id)

// 同一ページ View Transition ヘルパー（未対応/reduced-motion はそのまま実行＝壊れない）
function withVT(fn){
  if(!document.startViewTransition||matchMedia('(prefers-reduced-motion: reduce)').matches) return fn()
  return document.startViewTransition(fn)
}

// ===== 写真ストレージ (IndexedDB / Blob) =====
// 写真は容量の大きい IndexedDB に保存。localStorage には文字情報のみ。
const IDB_NAME='cafechoDB', IDB_STORE='photos'
let _db=null
function idbOpen(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db)
    const rq=indexedDB.open(IDB_NAME,1)
    rq.onupgradeneeded=()=>{const db=rq.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE)}
    rq.onsuccess=()=>{_db=rq.result;res(_db)}
    rq.onerror=()=>rej(rq.error)
  })
}
async function idbPut(id,blob){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(blob,id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}
async function idbGet(id){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const rq=tx.objectStore(IDB_STORE).get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error)})}
async function idbDel(id){const db=await idbOpen();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}

function dataURLtoBlob(d){
  const [head,b64]=d.split(',');const mime=(head.match(/:(.*?);/)||[])[1]||'image/jpeg'
  const bin=atob(b64),arr=new Uint8Array(bin.length)
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i)
  return new Blob([arr],{type:mime})
}
function blobToDataURL(blob){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob)})}
// 写真は "<recordId>#<index>" キーで複数保存
function pkey(id,i){return `${id}#${i}`}

// 画像を縮小して dataURL 化
function resizeToDataURL(file){
  return new Promise(res=>{
    const reader=new FileReader()
    reader.onload=ev=>{
      const img=new Image()
      img.onload=()=>{
        const max=900,scale=Math.min(1,max/Math.max(img.width,img.height))
        const cv=document.createElement('canvas')
        cv.width=img.width*scale;cv.height=img.height*scale
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height)
        res(cv.toDataURL('image/jpeg',0.8))
      }
      img.onerror=()=>res(null)
      img.src=ev.target.result
    }
    reader.readAsDataURL(file)
  })
}

// EXIF の DateTimeOriginal(0x9003) を読んで 'YYYY-MM-DD' を返す。失敗時 null。
async function getExifDate(file){
  try{
    const buf=await file.arrayBuffer()
    const dv=new DataView(buf)
    if(dv.getUint16(0)!==0xFFD8) return null            // JPEGでない
    let off=2
    while(off+4<dv.byteLength){
      const marker=dv.getUint16(off)
      const size=dv.getUint16(off+2)
      if(marker===0xFFE1){                                // APP1
        const start=off+4
        if(dv.getUint32(start)!==0x45786966) break        // "Exif"
        const tiff=start+6
        const le=dv.getUint16(tiff)===0x4949              // II=little / MM=big
        const u16=o=>dv.getUint16(o,le), u32=o=>dv.getUint32(o,le)
        const ifd0=tiff+u32(tiff+4)
        const find=(base,tag)=>{
          const n=u16(base)
          for(let i=0;i<n;i++){const e=base+2+i*12; if(u16(e)===tag) return e}
          return -1
        }
        const exifPtr=find(ifd0,0x8769)
        if(exifPtr<0) return null
        const exifIfd=tiff+u32(exifPtr+8)
        const dt=find(exifIfd,0x9003)                     // DateTimeOriginal
        if(dt<0) return null
        const vOff=tiff+u32(dt+8)                          // ASCII "YYYY:MM:DD HH:MM:SS"
        let s=''
        for(let i=0;i<10;i++){const c=dv.getUint8(vOff+i); if(!c)break; s+=String.fromCharCode(c)}
        const m=s.match(/^(\d{4}):(\d{2}):(\d{2})/)
        return m?`${m[1]}-${m[2]}-${m[3]}`:null
      }
      if((marker&0xFF00)!==0xFF00) break
      off+=2+size
    }
    return null
  }catch(e){return null}
}

// 表示用 objectURL のキャッシュ

// 表示用 objectURL のキャッシュ
const photoURLs={}
async function getPhotoURL(id){
  if(photoURLs[id])return photoURLs[id]
  try{const b=await idbGet(id);if(!b)return null;const u=URL.createObjectURL(b);photoURLs[id]=u;return u}catch(e){return null}
}
function dropPhotoCache(id){if(photoURLs[id]){URL.revokeObjectURL(photoURLs[id]);delete photoURLs[id]}}
// data-pid を持つ要素に写真を非同期で流し込む
function fillPhotos(root){
  root.querySelectorAll('[data-pid]').forEach(async el=>{
    const u=await getPhotoURL(el.dataset.pid)
    if(u){el.style.backgroundImage=`url("${u}")`;el.style.backgroundSize='cover';el.style.backgroundPosition='center';el.classList.remove('ph');const s=el.querySelector('span');if(s)s.remove()}
  })
}
// 起動時: 旧形式の写真を新スキーム("<id>#<i>") へ一度だけ移行
async function migratePhotosV2(){
  let changed=false
  for(const r of records){
    if(typeof r.photo==='string' && r.photo.startsWith('data:')){
      // 旧: localStorage 内 dataURL → IDB #0
      try{ await idbPut(pkey(r.id,0),dataURLtoBlob(r.photo)); r.photos=1; r.photo=null; r.hasPhoto=false; changed=true }catch(e){}
    } else if(r.hasPhoto && !(r.photos>0)){
      // 旧: 単一IDB(key=id) → #0 へ移設
      try{ const b=await idbGet(r.id); if(b){await idbPut(pkey(r.id,0),b);await idbDel(r.id)} r.photos=b?1:0; r.hasPhoto=false; changed=true }catch(e){}
    } else if(r.hasPhoto && r.photos>0){
      r.hasPhoto=false; changed=true
    }
  }
  if(changed){save();render()}
}

// 写真セルの HTML (旧dataURL / IDB / なし を吸収)
function photoCell(r,cls){
  if(r.photos>0) return `<div class="${cls} ph" data-pid="${pkey(r.id,0)}"><span>${esc(r.type)||'珈'}</span>${r.photos>1?`<i class="photo-n">+${r.photos-1}</i>`:''}</div>`
  if(r.photo) return `<img class="${cls}" src="${r.photo}">`
  return `<div class="${cls} ph"><span>${esc(r.type)||'珈'}</span></div>`
}

// ===== 描画 =====
function starHTML(n){let s='';for(let i=1;i<=5;i++)s+=`<span class="${i<=n?'':'off'}">${i<=n?'★':'☆'}</span>`;return `<span class="stars" aria-label="${n}/5">${s}</span>`}

function render(){
  $('st-count').textContent=records.length
  const avg=records.length?(records.reduce((a,r)=>a+(r.stars||0),0)/records.length):0
  $('st-avg').innerHTML=records.length?avg.toFixed(1)+'<small>★</small>':'–'
  const total=records.reduce((a,r)=>a+(Number(r.price)||0),0)
  $('st-total').innerHTML='¥'+total.toLocaleString()
  if(records.length){
    const c={};records.forEach(r=>{if(r.type)c[r.type]=(c[r.type]||0)+1})
    const fav=Object.entries(c).sort((a,b)=>b[1]-a[1])[0]
    $('st-fav').textContent=fav?fav[0]:'–'
  }else $('st-fav').textContent='–'
  // 連続記録ストリーク
  if(window.computeStreak){
    const st=computeStreak(records)
    const el=$('streakLine')
    if(st.current>=2){el.style.display='block';el.textContent=`♡ ${st.current}日連続 カフェ活中！`}
    else{el.style.display='none';el.textContent=''}
  }

  const present=[...new Set(records.map(r=>r.type).filter(Boolean))]
  const fopts=['すべて',...present]
  $('filters').innerHTML=fopts.map(f=>`<div class="fchip ${f===filter?'on':''}" data-f="${esc(f)}" role="button" tabindex="0" aria-pressed="${f===filter}">${esc(f)}</div>`).join('')
  $('filters').querySelectorAll('.fchip').forEach(el=>el.onclick=()=>{filter=el.dataset.f;withVT(()=>render())})

  // タグの絞り込み行
  const allTags=[...new Set(records.flatMap(r=>r.tags||[]))]
  $('tagFilters').innerHTML=allTags.map(t=>`<div class="fchip tag ${t===activeTag?'on':''}" data-t="${esc(t)}" role="button" tabindex="0" aria-pressed="${t===activeTag}">#${esc(t)}</div>`).join('')
  $('tagFilters').querySelectorAll('.fchip').forEach(el=>el.onclick=()=>{activeTag=(activeTag===el.dataset.t)?null:el.dataset.t;withVT(()=>render())})

  let items=records.filter(r=>(filter==='すべて'||r.type===filter)&&(!activeTag||(r.tags||[]).includes(activeTag)))
  if(query){const q=query.toLowerCase();items=items.filter(r=>`${r.menu||''} ${r.shop||''} ${r.memo||''} ${(r.tags||[]).join(' ')}`.toLowerCase().includes(q))}
  items=sortItems(items)
  if(records.length===0){$('empty').classList.remove('hidden');$('list').innerHTML='';return}
  $('empty').classList.add('hidden')
  if(items.length===0){
    // 検索/フィルタ結果0件: 状況文＋「条件をクリア」アクション（filter/activeTag/query をリセット）
    const hasCond=(filter!=='すべて')||activeTag||query
    $('list').innerHTML='<div class="no-result">'
      +'<div class="nr-t">'+(hasCond?'条件に合う記録はなかったよ':'該当する記録がないよ')+'</div>'
      +(hasCond?'<div class="nr-d">絞り込みや検索を見直すか、条件をクリアしてみよう。</div>'
        +'<button type="button" class="nr-clear" id="nrClear">条件をクリア</button>':'')
      +'</div>'
    if(hasCond){
      const b=$('nrClear')
      if(b)b.onclick=()=>{filter='すべて';activeTag=null;query='';$('search').value='';withVT(()=>render())}
    }
    return
  }
  $('list').innerHTML='<div class="list-hint">タップで詳細 ・ 左スワイプ→削除ボタン</div>'+items.map(r=>`
    <div class="card-wrap">
      <div class="card-del">削除</div>
      <div class="card" data-id="${r.id}">
        ${photoCell(r,'card-photo')}
        <div class="card-body">
          <div class="card-shop">${esc(r.shop)||'お店未設定'}</div>
          <div class="card-menu">${esc(r.menu)||'（無題）'}</div>
          <div class="card-meta">
            ${r.type?`<span class="tchip">${esc(r.type)}</span>`:''}
            ${r.stars?starHTML(r.stars):''}
          </div>
          ${(r.tags&&r.tags.length)?`<div class="card-tags">${r.tags.map(t=>`<span class="tagb">#${esc(t)}</span>`).join('')}</div>`:''}
          <div class="card-foot">
            <span class="card-date">${r.date||''}</span>
            ${r.price?`<span class="card-price">¥${Number(r.price).toLocaleString()}</span>`:''}
          </div>
        </div>
      </div>
    </div>`).join('')
  $('list').querySelectorAll('.card').forEach(attachCard)
  fillPhotos($('list'))
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function sortItems(arr){
  const a=[...arr]
  switch(sortBy){
    case 'old':       a.sort((x,y)=>(x.date||'').localeCompare(y.date||''));break
    case 'star':      a.sort((x,y)=>(y.stars||0)-(x.stars||0));break
    case 'priceHigh': a.sort((x,y)=>(Number(y.price)||0)-(Number(x.price)||0));break
    case 'priceLow':  a.sort((x,y)=>(Number(x.price)||0)-(Number(y.price)||0));break
    default:          a.sort((x,y)=>(y.date||'').localeCompare(x.date||'')) // new
  }
  return a
}
$('search').oninput=e=>{query=e.target.value.trim();withVT(()=>render())}
$('sort').onchange=e=>{sortBy=e.target.value;withVT(()=>render())}

// 店名/座標から Google マップのURLを作る (キー不要)
function mapUrl(r){
  if(r.shop) return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(r.shop)
  if(r.lat!=null&&r.lng!=null) return 'https://www.google.com/maps/search/?api=1&query='+r.lat+','+r.lng
  return null
}

// ===== 詳細表示 (メモも表示) =====
function openDetail(id){
  const r=records.find(x=>x.id===id);if(!r)return
  let dphoto
  if(r.photos>0){
    dphoto=`<div class="d-gallery">`+Array.from({length:r.photos},(_,i)=>`<div class="d-shot" data-pid="${pkey(r.id,i)}"></div>`).join('')+`</div>`
  } else if(r.photo){
    dphoto=`<div class="d-photo"><img src="${r.photo}"></div>`
  } else {
    dphoto=`<div class="d-photo"><span class="ph">${esc(r.type)||'珈'}</span></div>`
  }
  $('dContent').innerHTML=`
    ${dphoto}
    ${r.shop?`<a class="d-shop d-shop-link" href="${mapUrl(r)}" target="_blank" rel="noopener">📍 ${esc(r.shop)}<span class="map-go">マップで開く ›</span></a>`:`<div class="d-shop">お店未設定</div>`}
    <div class="d-menu">${esc(r.menu)||'（無題）'}</div>
    <div class="d-meta">${r.type?`<span class="tchip">${esc(r.type)}</span>`:''}${r.stars?starHTML(r.stars):''}</div>
    ${(r.tags&&r.tags.length)?`<div class="d-tags">${r.tags.map(t=>`<span class="tagb">#${esc(t)}</span>`).join('')}</div>`:''}
    <div class="d-sub">${r.date||''}${r.price?' ・ ¥'+Number(r.price).toLocaleString():''}</div>
    ${r.memo?`<div class="d-memo">${esc(r.memo)}</div>`:''}
    <div class="d-actions">
      <button class="d-del2" id="dDel">削除</button>
      <button class="d-edit" id="dEdit">編集する</button>
    </div>`
  $('dEdit').onclick=()=>{hideDetail();openEdit(id)}
  $('dDel').onclick=()=>{hideDetail();deleteRecord(id)}
  $('dMask').classList.add('on');$('dSheet').classList.add('on')
  fillPhotos($('dContent'))
  $('dContent').querySelectorAll('.d-shot[data-pid]').forEach(el=>el.onclick=async()=>{const u=await getPhotoURL(el.dataset.pid);if(u)openViewer(u)})
  $('dContent').querySelectorAll('.d-photo img').forEach(im=>im.onclick=()=>openViewer(im.src))
}
function hideDetail(){$('dMask').classList.remove('on');$('dSheet').classList.remove('on')}
$('dMask').onclick=hideDetail

// ===== ジェスチャー操作 =====
// カード: タップ=編集 / 左スワイプ=削除
// カード: タップ=詳細 / 左スワイプで「削除」ボタンが出る → それをタップで削除（誤削除防止の2段階）
function attachCard(el){
  const id=el.dataset.id
  const wrap=el.parentElement
  const del=wrap?wrap.querySelector('.card-del'):null
  const OPEN=-84
  let sx=0,sy=0,dx=0,hor=false,open=false
  function setOpen(o){open=o;el.style.transition='transform .2s';el.style.transform=`translateX(${o?OPEN:0}px)`}
  el.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=open?OPEN:0;hor=false;el.style.transition='none'
  },{passive:true})
  el.addEventListener('touchmove',e=>{
    const mx=e.touches[0].clientX-sx,my=e.touches[0].clientY-sy
    if(!hor && Math.abs(mx)>Math.abs(my)+8) hor=true
    if(hor){ e.preventDefault(); dx=Math.max(-100,Math.min(0,(open?OPEN:0)+mx)); el.style.transform=`translateX(${dx}px)` }
  },{passive:false})
  el.addEventListener('touchend',()=>{ if(hor) setOpen(dx<-42) })
  el.addEventListener('click',()=>{ if(hor)return; if(open){setOpen(false);return} openDetail(id) })
  if(del) del.onclick=()=>{ if(open) deleteRecord(id) }
}
function deleteRecord(id){
  const r=records.find(x=>x.id===id); const n=r?(r.photos||0):0
  records=records.filter(x=>x.id!==id);save();render();toast('削除したよ')
  for(let i=0;i<n;i++){dropPhotoCache(pkey(id,i));idbDel(pkey(id,i)).catch(()=>{})}
  dropPhotoCache(id);idbDel(id).catch(()=>{}) // 旧キーも掃除
}

// シート: 下スワイプで閉じる
function makeSwipeable(sheet,onClose){
  let startY=0,cur=0,drag=false
  sheet.addEventListener('touchstart',e=>{
    if(sheet.scrollTop>2){drag=false;return}
    startY=e.touches[0].clientY;cur=0;drag=true;sheet.style.transition='none'
  },{passive:true})
  sheet.addEventListener('touchmove',e=>{
    if(!drag)return
    cur=e.touches[0].clientY-startY
    if(cur>0){sheet.style.transform=`translateY(${cur}px)`}
  },{passive:true})
  sheet.addEventListener('touchend',()=>{
    if(!drag)return
    drag=false;sheet.style.transition=''
    sheet.style.transform=''
    if(cur>100)onClose()
  })
}

// .on クラスから aria-checked / roving tabindex を同期（openAdd/openEdit が直接 .on を操作するため）
function syncTypeAria(){
  const opts=[...$('typeGrid').querySelectorAll('.type-opt')]
  opts.forEach(x=>x.setAttribute('aria-checked',x.classList.contains('on')?'true':'false'))
  const sel=opts.find(x=>x.classList.contains('on'))
  const focusEl=sel||opts[0]
  opts.forEach(x=>{x.tabIndex=(x===focusEl)?0:-1})
}

  let ni=null
  switch(e.key){
    case 'ArrowRight':case 'ArrowDown':ni=Math.min(opts.length-1,i+1);break
    case 'ArrowLeft':case 'ArrowUp':ni=Math.max(0,i-1);break
    case 'Home':ni=0;break
    case 'End':ni=opts.length-1;break
    case 'Enter':case ' ':case 'Spacebar':ni=i;break

  }

  toast('バックアップ作成中…')
  // 写真(IDB)も dataURL として同梱し、単体で復元できるバックアップにする
  const out=[]
  for(const r of records){
    const rec={...r}
    rec.photosData=[]
    for(let i=0;i<(r.photos||0);i++){const b=await idbGet(pkey(r.id,i)); if(b)rec.photosData.push(await blobToDataURL(b))}
    delete rec.photo
    out.push(rec)
  }
  const data={app:'cafecho',version:DATA_VERSION,exportedAt:new Date().toISOString(),records:out}
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a')
  a.href=url;a.download=`cafecho-backup-${todayStr()}.json`
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)
  toast('バックアップを書き出したよ')

$('importBtn').onclick=()=>$('importInput').click()
$('importInput').onchange=e=>{
  const file=e.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=async ev=>{
    try{
      const parsed=JSON.parse(ev.target.result)
      const raw=Array.isArray(parsed)?parsed:(parsed.records||[])
      if(!raw.length){toast('読み込めるデータが無かったよ');return}
      // バックアップ内の写真を IndexedDB(#i)へ移す（migrate前に処理：migrateはphotosDataを落とすため）
      for(const r of raw){
        if(Array.isArray(r.photosData)&&r.photosData.length){
          for(let i=0;i<r.photosData.length;i++){try{await idbPut(pkey(r.id,i),dataURLtoBlob(r.photosData[i]));dropPhotoCache(pkey(r.id,i))}catch(e){}}
          r.photos=r.photosData.length
        } else if(typeof r.photo==='string'&&r.photo.startsWith('data:')){
          try{await idbPut(pkey(r.id,0),dataURLtoBlob(r.photo));r.photos=1;dropPhotoCache(pkey(r.id,0))}catch(e){}
        }
        delete r.photosData; r.photo=null
      }
      const incoming=migrate(raw)
      const byId={}
      records.forEach(r=>byId[r.id]=r)
      incoming.forEach(r=>byId[r.id]=r)
      records=Object.values(byId)
      save();render()
      $('bkMask').classList.remove('on');$('bkSheet').classList.remove('on')
      toast(`${incoming.length}件を復元したよ`)
    }catch(err){toast('ファイルを読めなかった…')}
    finally{e.target.value=''}
  }
  reader.readAsText(file)
}

function celebrate(){
  const c=$('celebrate'); if(!c)return
  for(let i=0;i<10;i++){
    const s=document.createElement('span'); s.className='cele'
    s.textContent=(i%3===0)?'✦':'♡'
    s.style.left=(50+(Math.random()*22-11))+'%'
    s.style.fontSize=(16+Math.random()*18)+'px'
    s.style.color=(Math.random()<.5)?'var(--md-secondary)':'var(--md-star)'
    s.style.setProperty('--dx',(Math.random()*200-100)+'px')
    s.style.setProperty('--rot',(Math.random()*60-30)+'deg')
    s.style.animationDelay=(Math.random()*0.12)+'s'
    c.appendChild(s); setTimeout(()=>s.remove(),1300)
  }
}
// 写真の全画面ビューア（ピンチズーム / パン / ダブルタップ）
let vScale=1,vx=0,vy=0,_d=0,_sc=1,_sx=0,_sy=0,_tx=0,_ty=0,_mode=null,_lastTap=0
function _applyV(){$('viewerImg').style.transform=`translate(${vx}px,${vy}px) scale(${vScale})`}
function openViewer(src){vScale=1;vx=0;vy=0;$('viewerImg').src=src;_applyV();$('viewer').classList.add('on')}
function closeViewer(){$('viewer').classList.remove('on');$('viewerImg').src=''}
function _dist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
;(function(){
  const v=$('viewer'); if(!v)return
  $('viewerClose').onclick=closeViewer
  v.addEventListener('click',e=>{
    if(e.target.id==='viewerImg'){const now=Date.now();if(now-_lastTap<300){vScale=vScale>1?1:2;vx=0;vy=0;_applyV()}_lastTap=now}
    else closeViewer()
  })
  v.addEventListener('touchstart',e=>{
    if(e.touches.length===2){_mode='pinch';_d=_dist(e);_sc=vScale}
    else if(e.touches.length===1){_mode='pan';_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_tx=vx;_ty=vy}
  },{passive:false})
  v.addEventListener('touchmove',e=>{
    if(_mode==='pinch'&&e.touches.length===2){e.preventDefault();vScale=Math.max(1,Math.min(5,_sc*_dist(e)/_d));_applyV()}
    else if(_mode==='pan'&&e.touches.length===1&&vScale>1){e.preventDefault();vx=_tx+(e.touches[0].clientX-_sx);vy=_ty+(e.touches[0].clientY-_sy);_applyV()}
  },{passive:false})
  v.addEventListener('touchend',e=>{if(e.touches.length===0){_mode=null;if(vScale<=1){vx=0;vy=0;_applyV()}}})
})();

// アクセシビリティ: キーボード操作の補助（既存ロジックは変更せず click を合成するだけ）
document.addEventListener('keydown',e=>{
  const t=e.target
  if((e.key==='Enter'||e.key===' ')&&t&&t.getAttribute&&t.getAttribute('role')==='button'){
    e.preventDefault(); t.click()
  }
  if(e.key==='Escape'){
    const v=$('viewer'); if(v&&v.classList.contains('on')){closeViewer();return}
    document.querySelectorAll('.sheet.on').forEach(s=>{
      if(s.id==='sheet')hideSheet(); else if(s.id==='bkSheet')hideBackup(); else if(s.id==='dSheet')hideDetail()
    })
  }
})

// オフライン対応 (Service Worker)
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}

// 永続ストレージを要求（容量不足での自動退避を防ぎ、写真を消えにくくする）
if(navigator.storage && navigator.storage.persist){
  navigator.storage.persisted().then(p=>{ if(!p) navigator.storage.persist().catch(()=>{}) }).catch(()=>{})
}
