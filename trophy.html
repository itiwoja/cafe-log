<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<style id="cjg">html{visibility:hidden}</style>
<script>if(self===top){document.documentElement.style.visibility='visible'}else{try{top.location=self.location}catch(e){}}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF8F4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#19120D" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>カフェ日記 — トロフィー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="achievements.js"></script>
<style>
/* ============================================================
   カフェ日記 トロフィー — Material Design 3 reskin（index.html と同一トークン）
   獲得=primary、未獲得=低強調。M3 26カラーロール(light/dark)。
   JS・id・class・データキー(cafeLog.v1)は一切変更していない（見た目層のみ）。
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --md-primary:#7E5539; --md-on-primary:#FFFFFF;
  --md-primary-container:#FFDCC2; --md-on-primary-container:#2D1600;
  --md-secondary:#9C4458; --md-on-secondary:#FFFFFF;
  --md-secondary-container:#FFD9DF; --md-on-secondary-container:#3E0017;
  --md-error:#BA1A1A; --md-on-error:#FFFFFF;
  --md-surface:#FFF8F4; --md-on-surface:#221A14; --md-on-surface-variant:#51453B;
  --md-surface-container-lowest:#FFFFFF; --md-surface-container-low:#FCF0E8;
  --md-surface-container:#F7EAE0; --md-surface-container-high:#F1E4DA;
  --md-surface-container-highest:#EBDED4;
  --md-outline:#847469; --md-outline-variant:#D6C3B6;
  --md-star:#9C6B07;
  --label:var(--md-on-surface);--secondary-label:var(--md-on-surface-variant);
  --bg:var(--md-surface);--fill:var(--md-surface-container-high);--tint:var(--md-primary);
  --focus:var(--md-primary);
  --font-sys:"M PLUS 2","Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,-apple-system,sans-serif;
  --r-xs:4px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:999px;
  --ease-standard:cubic-bezier(.2,0,0,1);--ease-accelerate:cubic-bezier(.3,0,.8,.15);--ease-spring:cubic-bezier(.34,1.56,.64,1);
}
@media (prefers-color-scheme:dark){
  :root{
    --md-primary:#F3B98C; --md-on-primary:#48280F;
    --md-primary-container:#623E23; --md-on-primary-container:#FFDCC2;
    --md-secondary:#FFB2BF; --md-on-secondary:#5E1129;
    --md-secondary-container:#7C2D40; --md-on-secondary-container:#FFD9DF;
    --md-error:#FFB4AB; --md-on-error:#690005;
    --md-surface:#19120D; --md-on-surface:#EFE0D6; --md-on-surface-variant:#D6C3B6;
    --md-surface-container-lowest:#130C08; --md-surface-container-low:#221A14;
    --md-surface-container:#261D17; --md-surface-container-high:#312720;
    --md-surface-container-highest:#3D322A;
    --md-outline:#9F8C80; --md-outline-variant:#51453B;
    --md-star:#F4C95D;
  }
}
html,body{height:100%;}
html{background-color:var(--bg);}
body{font-family:var(--font-sys);color:var(--label);background-color:var(--bg);
  min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5;letter-spacing:.01em;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px calc(env(safe-area-inset-bottom) + 80px);}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px;}

.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--md-on-surface-variant);
  text-decoration:none;margin-bottom:18px;min-height:44px;transition:color .2s var(--ease-standard);}
.back:hover{color:var(--md-primary);}
.title{font-size:30px;line-height:38px;font-weight:800;letter-spacing:-.01em;color:var(--md-on-surface);}
.score{font-size:14px;color:var(--md-on-surface-variant);margin-top:6px;font-weight:500;letter-spacing:.2px;font-variant-numeric:tabular-nums;}
.scorebar{height:8px;border-radius:var(--r-full);background:var(--md-surface-container-high);overflow:hidden;margin:12px 0 4px;}
.scorebar i{display:block;height:100%;background:var(--md-primary);border-radius:var(--r-full);}
/* M3 group 見出し = secondary-container ピル（ローズ差し色） */
.group-h{font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--md-on-secondary-container);background:var(--md-secondary-container);
  display:inline-block;padding:6px 14px;border-radius:var(--r-full);margin:28px 0 10px;}
.group-h .grp-n{font-weight:600;opacity:.75;margin-left:4px;font-variant-numeric:tabular-nums;}
/* M3 list item（獲得=on / 未獲得=低強調） */
.tr{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--md-outline-variant);}
.tr:last-child{border-bottom:none;}
.tr-badge{width:44px;height:44px;flex-shrink:0;border-radius:var(--r-md);display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:700;border:1.5px solid var(--md-outline-variant);color:var(--md-outline);background:var(--md-surface-container-low);}
.tr.on .tr-badge{background:var(--md-primary);color:var(--md-on-primary);border-color:transparent;}
.tr-body{flex:1;min-width:0;}
.tr-title{font-size:16px;font-weight:600;color:var(--md-on-surface-variant);}
.tr.on .tr-title{color:var(--md-on-surface);}
.tr-desc{font-size:13px;color:var(--md-on-surface-variant);margin-top:1px;}
.tr-prog{height:5px;border-radius:var(--r-full);background:var(--md-surface-container-high);overflow:hidden;margin-top:7px;}
.tr-prog i{display:block;height:100%;background:var(--md-outline);border-radius:var(--r-full);}
.tr.on .tr-prog i{background:var(--md-primary);}
.tr-have{flex-shrink:0;font-size:13px;font-weight:600;color:var(--md-on-surface-variant);min-width:48px;text-align:right;font-variant-numeric:tabular-nums;}
.tr.on .tr-have{color:var(--md-primary);}
.foot{margin-top:30px;text-align:center;font-size:13px;color:var(--md-on-surface-variant);line-height:1.7;}
.empty-note{font-size:14px;color:var(--md-on-surface-variant);text-align:center;padding:8px 0 4px;letter-spacing:.2px;}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms var(--ease-accelerate) both; }
::view-transition-new(root){ animation: vtIn 360ms var(--ease-spring) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;}
  ::view-transition-old(root),::view-transition-new(root){animation:none!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">トロフィー</div>
  <div class="score" id="score"></div>
  <div class="scorebar"><i id="scorebar"></i></div>
  <div id="list"></div>
  <div class="foot">カフェを記録すると自動で獲得 ✦</div>
</div>
<script>
const KEY='cafeLog.v1'
function loadRecords(){try{const r=JSON.parse(localStorage.getItem(KEY));if(!r)return[];return Array.isArray(r)?r:(r.records||[])}catch(e){return[]}}
const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

const records=loadRecords()
const ach=(window.computeAchievements?computeAchievements(records):[])
const earnedN=ach.filter(a=>a.earned).length
$('score').textContent=`${earnedN} / ${ach.length} 獲得`
$('scorebar').style.width=ach.length?Math.round(earnedN/ach.length*100)+'%':'0%'

function trItem(a){
  return `<div class="tr ${a.earned?'on':''}">
      <div class="tr-badge">${a.earned?'✓':'🔒'}</div>
      <div class="tr-body">
        <div class="tr-title">${esc(a.title)}</div>
        <div class="tr-desc">${esc(a.desc)}</div>
        <div class="tr-prog"><i style="width:${Math.round(a.pct*100)}%"></i></div>
      </div>
      <div class="tr-have">${a.earned?'獲得':a.have+'/'+a.target}</div>
    </div>`
}
function section(title,items){
  if(!items.length) return ''
  const e=items.filter(a=>a.earned).length
  return `<div class="group-h">${esc(title)} <span class="grp-n">${e}/${items.length}</span></div>`+items.map(trItem).join('')
}
// 総合 → ドリンクごと（各セクションに デビュー/マニア/極み）
const genres=(window.MENCHO_GENRES||[])
let html=section('総合', ach.filter(a=>a.group==='総合'))
genres.forEach(g=>{ html+=section(g, ach.filter(a=>a.id.split(':')[1]===g)) })
// 記録が無くても全トロフィーを一覧表示（目標を眺められる）
$('list').innerHTML = (records.length?'':'<div class="empty-note">まだ記録なし。これが集めるトロフィー一覧 ✦</div>') + html
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
