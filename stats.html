<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>カフェ日記 分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="achievements.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--paper:#FBF3EF;--ink:#4B3A40;--ink-2:#6A565D;--ink-3:#7A646F;--line:#EEE0DB;--line-2:#F6ECE8;--card:#FFFFFF;--tape1:#A86A2A;--tape2:#A85C74;--tape3:#D98FA0;--tape4:#7E6796;--tape3-deep:#B35870;--tape3-text:#AE536B;--focus:#7A3A52;}
html,body{height:100%;}
body{font-family:'Zen Maru Gothic','Klee One',sans-serif;color:var(--ink);background-color:var(--paper);background-image:radial-gradient(rgba(43,40,35,.06) 1.2px,transparent 1.2px);background-size:20px 20px;
  min-height:100dvh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px 80px;}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--ink-2);
  text-decoration:none;margin-bottom:18px;}
.title{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:20px;}

.stats{display:flex;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:30px;}
.stat{flex:1;padding:14px 4px;text-align:center;}
.stat + .stat{border-left:1px solid var(--line);}
.stat .v{font-size:21px;font-weight:900;line-height:1;}
.stat .v small{font-size:11px;color:var(--ink-3);font-weight:700;}
.stat .l{font-size:9px;color:var(--ink-3);margin-top:7px;font-weight:700;letter-spacing:1px;}

.sec{margin-bottom:34px;}
.sec-h{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--ink-3);text-transform:uppercase;
  margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--line);}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.bar-label{width:64px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--ink-2);}
.bar-track{flex:1;height:10px;background:var(--line-2);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--ink);border-radius:5px;min-width:2px;}
.bar-val{width:54px;flex-shrink:0;text-align:right;font-size:12px;font-weight:700;}
.bar-val small{color:var(--ink-3);font-weight:600;}
/* ストリーク */
.streaks{display:flex;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.sk{flex:1;padding:14px 4px;text-align:center;}
.sk+.sk{border-left:1px solid var(--line);}
.sk-v{font-size:22px;font-weight:900;}
.sk-v small{font-size:11px;color:var(--ink-3);}
.sk-l{font-size:9px;color:var(--ink-3);margin-top:6px;font-weight:700;letter-spacing:1px;}
/* カフェ活グラフ（草） */
.grass-scroll{overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.grass-scroll::-webkit-scrollbar{display:none;}
.grass-inner{width:max-content;}
.grass-cols{display:flex;gap:3px;}
.g-col{display:flex;flex-direction:column;gap:3px;}
.g-cell{width:12px;height:12px;border-radius:2px;background:var(--line-2);}
.g-mrow{display:flex;gap:3px;margin-bottom:4px;}
.g-mlabel{width:12px;font-size:9px;color:var(--ink-3);white-space:nowrap;font-weight:700;}
.g0{background:var(--line-2);}
.g1{background:rgba(11,11,11,.25);}
.g2{background:rgba(11,11,11,.45);}
.g3{background:rgba(11,11,11,.68);}
.g4{background:rgba(11,11,11,.9);}
.lg.g0{background:var(--line-2);}.lg.g1{background:rgba(11,11,11,.25);}.lg.g2{background:rgba(11,11,11,.45);}.lg.g3{background:rgba(11,11,11,.68);}.lg.g4{background:rgba(11,11,11,.9);}

/* カレンダー */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:15px;font-weight:800;}
.cal-nav{width:34px;height:34px;border:1px solid var(--line);background:transparent;border-radius:8px;font-size:16px;cursor:pointer;color:var(--ink-2);}
.cal-nav:active{background:var(--line-2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-wd{margin-bottom:6px;}
.cal-wd-c{text-align:center;font-size:10px;color:var(--ink-3);font-weight:700;}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;color:var(--ink-2);background:var(--line-2);}
.cal-cell.empty{background:transparent;}
.cal-cell.lv0{background:var(--line-2);color:var(--ink-3);}
.cal-cell.lv1{background:rgba(11,11,11,.25);color:var(--ink);}
.cal-cell.lv2{background:rgba(11,11,11,.55);color:#fff;}
.cal-cell.lv3{background:rgba(11,11,11,.85);color:#fff;}
.cal-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:10px;font-size:10px;color:var(--ink-3);}
.lg{width:14px;height:14px;border-radius:3px;display:inline-block;}
.lg.lv0{background:var(--line-2);}.lg.lv1{background:rgba(11,11,11,.25);}.lg.lv2{background:rgba(11,11,11,.55);}.lg.lv3{background:rgba(11,11,11,.85);}

/* 殿堂 */
.hall{display:flex;flex-direction:column;gap:12px;}
.hall-item{display:flex;align-items:center;gap:12px;}
.hall-rank{width:22px;flex-shrink:0;font-size:15px;font-weight:900;color:var(--ink-3);text-align:center;}
.hall-photo{width:52px;height:52px;flex-shrink:0;border-radius:6px;background:var(--line-2);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-3);font-weight:700;overflow:hidden;}
.hall-photo img{width:100%;height:100%;object-fit:cover;}
.hall-body{flex:1;min-width:0;}
.hall-menu{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hall-shop{font-size:11px;color:var(--ink-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hall-stars{font-size:12px;letter-spacing:1px;margin-top:3px;}

/* お店 */
.shops{display:flex;flex-direction:column;}
.shop{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);
  text-decoration:none;color:inherit;}
.shop:last-child{border-bottom:none;}
.shop-body{flex:1;min-width:0;}
.shop-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shop-sub{font-size:11px;color:var(--ink-3);margin-top:2px;}
.shop-count{flex-shrink:0;text-align:right;}
.shop-count b{font-size:18px;font-weight:900;}
.shop-count span{font-size:10px;color:var(--ink-3);display:block;}
.shop-arrow{color:var(--ink-3);font-weight:700;}

.none{padding:30px 0;text-align:center;color:var(--ink-3);font-size:13px;}
.empty-all{padding:100px 24px;text-align:center;color:var(--ink-3);}
.empty-all .t{font-size:15px;font-weight:700;color:var(--ink-2);}

/* ===== コラージュ アクセント ===== */
.title,.sec-h,.stat .v,.sk-v,.cal-title,.hall-menu,.shop-name{font-family:'Klee One',cursive;}
.sec-h{display:inline-block;background:var(--tape2);color:#fff;border:none;border-radius:8px;
  padding:5px 12px;transform:rotate(-1deg);text-transform:none;}
.bar-fill{background:var(--tape3-text);}
.hall-stars,.pop-stars{color:var(--tape1);}
.shop-count b{color:var(--tape3-text);}
/* カレンダーは塗りのピンクは維持し、文字色を濃くしてコントラスト確保 */
.cal-cell.lv1{background:rgba(217,143,160,.30);color:var(--ink);}
.cal-cell.lv2{background:rgba(217,143,160,.62);color:var(--ink);}
.cal-cell.lv3{background:rgba(217,143,160,.9);color:var(--ink);}
.g1{background:rgba(217,143,160,.30);}.g2{background:rgba(217,143,160,.55);}.g3{background:rgba(217,143,160,.78);}.g4{background:rgba(217,143,160,.95);}
.lg.g1{background:rgba(217,143,160,.30);}.lg.g2{background:rgba(217,143,160,.55);}.lg.g3{background:rgba(217,143,160,.78);}.lg.g4{background:rgba(217,143,160,.95);}

/* ===== アクセシビリティ (WCAG 2.2 AA) ===== */
a:focus-visible,button:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:8px;}
.cal-nav{min-width:44px;min-height:44px;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;}
}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* モーダル/ビューア表示中は背景をロック（スワイプ貫通防止） */
html:has(.mask.on),body:has(.mask.on),html:has(#viewer.on),body:has(#viewer.on){overflow:hidden;}
.sheet{overscroll-behavior:contain;}
.mask{touch-action:none;overscroll-behavior:none;} /* 暗幕もスクロール不可 */

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms cubic-bezier(.3,0,.8,.15) both; }
::view-transition-new(root){ animation: vtIn 360ms cubic-bezier(.34,1.56,.64,1) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){ ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">分析</div>
  <div id="content"></div>
</div>

<script>
// ===== データ読み込み (index.html と同じ localStorage) =====
const KEY='cafeLog.v1'
function loadRecords(){
  try{const raw=JSON.parse(localStorage.getItem(KEY));if(!raw)return [];return Array.isArray(raw)?raw:(raw.records||[])}
  catch(e){return []}
}
const records=loadRecords()
const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n)}

// ===== 写真 (IndexedDB) — 殿堂のサムネ用 =====
const IDB_NAME='cafechoDB',IDB_STORE='photos';let _db=null
function idbOpen(){return new Promise((res,rej)=>{if(_db)return res(_db);const rq=indexedDB.open(IDB_NAME,1);
  rq.onupgradeneeded=()=>{const db=rq.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE)};
  rq.onsuccess=()=>{_db=rq.result;res(_db)};rq.onerror=()=>rej(rq.error)})}
async function idbGet(id){try{const db=await idbOpen();return await new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const rq=tx.objectStore(IDB_STORE).get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error)})}catch(e){return null}}
async function fillPhotos(root){
  for(const el of root.querySelectorAll('[data-pid]')){
    const b=await idbGet(el.dataset.pid)
    if(b){const u=URL.createObjectURL(b);el.innerHTML=`<img src="${u}">`}
  }
}

function bar(label,val,max,unit){
  const w=max>0?Math.round(val/max*100):0
  return `<div class="bar-row"><div class="bar-label">${esc(label)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
    <div class="bar-val">${val}<small>${unit||''}</small></div></div>`
}

function render(){
  if(!records.length){
    $('content').innerHTML='<div class="empty-all"><div class="t">まだ記録がないよ</div></div>'
    return
  }
  // 概要
  const total=records.reduce((a,r)=>a+(Number(r.price)||0),0)
  const rated=records.filter(r=>r.stars>0)
  const avg=rated.length?(rated.reduce((a,r)=>a+r.stars,0)/rated.length):0
  const gc={};records.forEach(r=>{if(r.type)gc[r.type]=(gc[r.type]||0)+1})
  const mfn=Object.entries(gc).sort((a,b)=>b[1]-a[1])[0]
  let html=`<div class="stats">
    <div class="stat"><div class="v">${records.length}</div><div class="l">杯</div></div>
    <div class="stat"><div class="v">¥${total.toLocaleString()}</div><div class="l">合計</div></div>
    <div class="stat"><div class="v">${avg?avg.toFixed(1):'–'}<small>★</small></div><div class="l">平均</div></div>
    <div class="stat"><div class="v" style="font-size:14px">${mfn?esc(mfn[0]):'–'}</div><div class="l">推し</div></div>
  </div>`

  // 連続記録
  const st=window.computeStreak?computeStreak(records):{current:0,longest:0,days:0}
  html+=`<div class="sec"><div class="sec-h">連続記録</div>
    <div class="streaks">
      <div class="sk"><div class="sk-v">${st.current}<small>日</small></div><div class="sk-l">現在の連続</div></div>
      <div class="sk"><div class="sk-v">${st.longest}<small>日</small></div><div class="sk-l">最長連続</div></div>
      <div class="sk"><div class="sk-v">${st.days}<small>日</small></div><div class="sk-l">カフェ活した日数</div></div>
    </div></div>`

  // カフェ活グラフ（GitHubの草風・過去1年）
  html+=`<div class="sec"><div class="sec-h">カフェ活グラフ（過去1年）</div><div id="grass"></div></div>`

  // カフェ活カレンダー（月別）
  html+=`<div class="sec"><div class="sec-h">カフェ活カレンダー</div><div id="cal"></div></div>`

  // 月別
  const mc={};records.forEach(r=>{if(r.date){const k=r.date.slice(0,7);mc[k]=mc[k]||{n:0,y:0};mc[k].n++;mc[k].y+=Number(r.price)||0}})
  const months=Object.keys(mc).sort().slice(-12)
  if(months.length){
    const max=Math.max(...months.map(m=>mc[m].n))
    html+=`<div class="sec"><div class="sec-h">月別の杯数</div>${
      months.map(m=>{const[y,mm]=m.split('-');return bar(`${y.slice(2)}/${mm}`,mc[m].n,max,'杯')}).join('')
    }</div>`
  }

  // ジャンル別
  const genres=Object.entries(gc).sort((a,b)=>b[1]-a[1])
  if(genres.length){
    const max=genres[0][1]
    html+=`<div class="sec"><div class="sec-h">ジャンル別</div>${
      genres.map(([g,n])=>bar(g,n,max,'杯')).join('')
    }</div>`
  }

  // ★分布
  if(rated.length){
    const dist=[5,4,3,2,1].map(s=>({s,n:records.filter(r=>r.stars===s).length}))
    const max=Math.max(...dist.map(d=>d.n))
    html+=`<div class="sec"><div class="sec-h">評価の分布</div>${
      dist.map(d=>bar('★'+d.s,d.n,max,'')).join('')
    }</div>`
  }

  // 殿堂 (★4以上)
  const hall=records.filter(r=>r.stars>=4).sort((a,b)=>(b.stars-a.stars)||((b.date||'').localeCompare(a.date||''))).slice(0,12)
  html+=`<div class="sec"><div class="sec-h">殿堂入り（★4以上）</div>`
  if(hall.length){
    html+=`<div class="hall">${hall.map((r,i)=>`
      <div class="hall-item">
        <div class="hall-rank">${i+1}</div>
        <div class="hall-photo" ${(r.photo||r.hasPhoto)?`data-pid="${r.id}"`:''}>${r.photo?`<img src="${r.photo}">`:(r.hasPhoto?'':'麺')}</div>
        <div class="hall-body">
          <div class="hall-menu">${esc(r.menu)||'（無題）'}</div>
          <div class="hall-shop">${esc(r.shop)||'お店未設定'}</div>
          <div class="hall-stars">${starStr(r.stars)}</div>
        </div>
      </div>`).join('')}</div>`
  }else html+=`<div class="none">★4以上の記録がまだないよ</div>`
  html+=`</div>`

  // お店ごと
  const sc={}
  records.forEach(r=>{const s=(r.shop||'').trim();if(!s)return;
    sc[s]=sc[s]||{n:0,star:0,rated:0,y:0,last:''}
    sc[s].n++;sc[s].y+=Number(r.price)||0
    if(r.stars>0){sc[s].star+=r.stars;sc[s].rated++}
    if((r.date||'')>sc[s].last)sc[s].last=r.date||''
  })
  const shops=Object.entries(sc).sort((a,b)=>b[1].n-a[1].n)
  html+=`<div class="sec"><div class="sec-h">お店ごとのまとめ</div>`
  if(shops.length){
    html+=`<div class="shops">${shops.map(([s,d])=>{
      const av=d.rated?(d.star/d.rated).toFixed(1)+'★':'–'
      return `<a class="shop" href="index.html?q=${encodeURIComponent(s)}">
        <div class="shop-body">
          <div class="shop-name">${esc(s)}</div>
          <div class="shop-sub">平均 ${av} ・ ¥${d.y.toLocaleString()} ・ 最終 ${d.last||'–'}</div>
        </div>
        <div class="shop-count"><b>${d.n}</b><span>杯</span></div>
        <div class="shop-arrow">›</div>
      </a>`
    }).join('')}</div>`
  }else html+=`<div class="none">お店名つきの記録がまだないよ</div>`
  html+=`</div>`

  $('content').innerHTML=html
  fillPhotos($('content'))
  renderGrass()
  renderCalendar()
}

// カフェ活グラフ（過去1年・週=列 / 曜日=行）
function renderGrass(){
  const el=$('grass'); if(!el) return
  const counts={}; records.forEach(r=>{if(r.date)counts[r.date]=(counts[r.date]||0)+1})
  const toISO=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`
  const end=new Date(); end.setHours(0,0,0,0)
  const start=new Date(end); start.setDate(start.getDate()-364); start.setDate(start.getDate()-start.getDay()) // 日曜起点
  const WK=['日','月','火','水','木','金','土']
  // 月ラベル（週ごとに月が変わったら表示）
  const weeks=[]; let week=[]; const cur=new Date(start)
  while(cur<=end){
    const iso=toISO(cur), c=counts[iso]||0
    const lvl=c===0?0:c===1?1:c===2?2:c===3?3:4
    week.push(`<div class="g-cell g${lvl}" title="${iso} ・ ${c}杯"></div>`)
    if(cur.getDay()===6){weeks.push({cells:week,m:cur.getMonth()}); week=[]}
    cur.setDate(cur.getDate()+1)
  }
  if(week.length)weeks.push({cells:week,m:end.getMonth()})
  let lastM=-1
  const labels=weeks.map(w=>{const show=w.m!==lastM; lastM=w.m; return `<div class="g-mlabel">${show?(w.m+1)+'月':''}</div>`}).join('')
  const cols=weeks.map(w=>`<div class="g-col">${w.cells.join('')}</div>`).join('')
  el.innerHTML=`
    <div class="grass-scroll">
      <div class="grass-inner">
        <div class="g-mrow">${labels}</div>
        <div class="grass-cols">${cols}</div>
      </div>
    </div>
    <div class="cal-legend">少 <i class="lg g0"></i><i class="lg g1"></i><i class="lg g2"></i><i class="lg g3"></i><i class="lg g4"></i> 多</div>`
}

// カフェ活カレンダー (月送り)
let calY,calM
function renderCalendar(){
  const cal=$('cal'); if(!cal) return
  if(calY===undefined){const n=new Date();calY=n.getFullYear();calM=n.getMonth()}
  const counts={}; records.forEach(r=>{if(r.date)counts[r.date]=(counts[r.date]||0)+1})
  const startDow=new Date(calY,calM,1).getDay()
  const dim=new Date(calY,calM+1,0).getDate()
  const wd=['日','月','火','水','木','金','土']
  let cells=''
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`
  for(let d=1;d<=dim;d++){
    const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const c=counts[iso]||0
    const lvl=c===0?0:c===1?1:c===2?2:3
    cells+=`<div class="cal-cell lv${lvl}">${d}</div>`
  }
  cal.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" id="calPrev" aria-label="前の月">‹</button>
      <span class="cal-title">${calY}年${calM+1}月</span>
      <button class="cal-nav" id="calNext" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid cal-wd">${wd.map(w=>`<div class="cal-wd-c">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">少 <i class="lg lv0"></i><i class="lg lv1"></i><i class="lg lv2"></i><i class="lg lv3"></i> 多</div>`
  $('calPrev').onclick=()=>{calM--; if(calM<0){calM=11;calY--} renderCalendar()}
  $('calNext').onclick=()=>{calM++; if(calM>11){calM=0;calY++} renderCalendar()}
}
render()
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
