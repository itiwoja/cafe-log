<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<style id="cjg">html{visibility:hidden}</style>
<script>if(self===top){document.documentElement.style.visibility='visible'}else{try{top.location=self.location}catch(e){}}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF8F4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#19120D" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>カフェ日記 — 用語辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   カフェ日記 用語辞典 — Material Design 3 reskin（index.html と同一トークン）
   読み物として可読性最優先。M3 26カラーロール(light/dark)。
   JS・id・class・データは一切変更していない（見た目層のみ）。
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --md-primary:#7E5539; --md-on-primary:#FFFFFF;
  --md-primary-container:#FFDCC2; --md-on-primary-container:#2D1600;
  --md-secondary:#9C4458; --md-on-secondary:#FFFFFF;
  --md-secondary-container:#FFD9DF; --md-on-secondary-container:#3E0017;
  --md-surface:#FFF8F4; --md-on-surface:#221A14; --md-on-surface-variant:#51453B;
  --md-surface-container-lowest:#FFFFFF; --md-surface-container-low:#FCF0E8;
  --md-surface-container:#F7EAE0; --md-surface-container-high:#F1E4DA;
  --md-surface-container-highest:#EBDED4;
  --md-outline:#847469; --md-outline-variant:#D6C3B6;
  --label:var(--md-on-surface);--secondary-label:var(--md-on-surface-variant);
  --bg:var(--md-surface);--fill:var(--md-surface-container-high);--tint:var(--md-primary);
  --focus:var(--md-primary);
  --font-sys:"M PLUS 2","Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,-apple-system,sans-serif;
  --r-xs:4px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:999px;
  --ease-standard:cubic-bezier(.2,0,0,1);--ease-accelerate:cubic-bezier(.3,0,.8,.15);--ease-spring:cubic-bezier(.34,1.56,.64,1);
}
@media (prefers-color-scheme:dark){
  :root{
    --md-primary:#F3B98C; --md-on-primary:#48280F;
    --md-primary-container:#623E23; --md-on-primary-container:#FFDCC2;
    --md-secondary:#FFB2BF; --md-on-secondary:#5E1129;
    --md-secondary-container:#7C2D40; --md-on-secondary-container:#FFD9DF;
    --md-surface:#19120D; --md-on-surface:#EFE0D6; --md-on-surface-variant:#D6C3B6;
    --md-surface-container-lowest:#130C08; --md-surface-container-low:#221A14;
    --md-surface-container:#261D17; --md-surface-container-high:#312720;
    --md-surface-container-highest:#3D322A;
    --md-outline:#9F8C80; --md-outline-variant:#51453B;
  }
}
html,body{height:100%;scroll-behavior:smooth;}
html{background-color:var(--bg);}
body{font-family:var(--font-sys);color:var(--label);background-color:var(--bg);
  min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5;letter-spacing:.01em;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 20px calc(env(safe-area-inset-bottom) + 80px);}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px;}

.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--md-on-surface-variant);
  text-decoration:none;margin-bottom:18px;min-height:44px;transition:color .2s var(--ease-standard);}
.back:hover{color:var(--md-primary);}
.title{font-size:30px;line-height:38px;font-weight:800;letter-spacing:-.01em;color:var(--md-on-surface);}
.sub{font-size:14px;color:var(--md-on-surface-variant);margin-top:6px;line-height:1.7;letter-spacing:.1px;}

/* 上部クイックジャンプ（M3 filter chip） */
.nav{display:flex;gap:8px;overflow-x:auto;margin:16px -20px 4px;padding:0 20px 4px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-chip{flex-shrink:0;border:1px solid var(--md-outline);border-radius:var(--r-sm);padding:8px 16px;font-size:14px;min-height:44px;
  font-weight:500;color:var(--md-on-surface-variant);background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background var(--dur-fast,200ms) var(--ease-standard),color var(--dur-fast,200ms) var(--ease-standard),border-color var(--dur-fast,200ms) var(--ease-standard),transform var(--dur-fast,200ms) var(--ease-spring);}
.nav-chip:hover{background:var(--md-surface-container-high);}
.nav-chip:active{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border-color:transparent;transform:scale(.95);}

/* M3 filled text field 風 検索 */
.search{width:100%;background:var(--md-surface-container-high);border:none;
  border-bottom:1px solid var(--md-on-surface-variant);border-radius:var(--r-xs) var(--r-xs) 0 0;
  padding:12px 16px;font-family:inherit;font-size:16px;color:var(--md-on-surface);margin:14px 0 6px;min-height:48px;
  transition:border-color .15s var(--ease-standard),box-shadow .15s var(--ease-standard);}
.search::placeholder{color:var(--md-outline);}
.search:focus{outline:none;border-bottom-color:var(--md-primary);box-shadow:inset 0 -1px 0 0 var(--md-primary);}
.search:focus-visible{outline:3px solid var(--focus);outline-offset:1px;}
.count{font-size:13px;color:var(--md-on-surface-variant);margin-bottom:8px;letter-spacing:.2px;font-variant-numeric:tabular-nums;}
/* M3 group 見出し = secondary-container ピル（ローズ差し色） */
.group-h{font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--md-on-secondary-container);background:var(--md-secondary-container);
  display:inline-block;padding:6px 14px;border-radius:var(--r-full);margin:30px 0 8px;scroll-margin-top:14px;}
.term{padding:18px 0;border-bottom:1px solid var(--md-outline-variant);}
.term-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.term-w{font-size:19px;font-weight:700;letter-spacing:-.005em;color:var(--md-on-surface);}
.term-r{font-size:13px;color:var(--md-on-surface-variant);font-weight:500;}
/* タグ = primary-container（モカの差し色） */
.term-tag{font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--md-on-primary-container);background:var(--md-primary-container);
  padding:3px 9px;border-radius:var(--r-sm);}
.term-d{font-size:15px;line-height:1.85;color:var(--md-on-surface-variant);margin-top:8px;}
.term-d b{color:var(--md-on-surface);font-weight:700;}
.none{padding:60px 0;text-align:center;color:var(--md-on-surface-variant);font-size:15px;}
.foot{margin-top:34px;text-align:center;font-size:13px;color:var(--md-on-surface-variant);line-height:1.8;}

/* アプリ的挙動: 長押しの文字選択を無効 / プルto更新を無効 */
html,body{overscroll-behavior:none;}
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* ページ間のなめらか遷移（クロスドキュメント View Transitions・未対応は通常遷移） */
@view-transition{ navigation: auto; }
::view-transition-old(root){ animation: vtOut 220ms var(--ease-accelerate) both; }
::view-transition-new(root){ animation: vtIn 360ms var(--ease-spring) both; }
@keyframes vtOut{ to{opacity:0;transform:translateY(-10px) scale(.97);} }
@keyframes vtIn{ from{opacity:0;transform:translateY(16px) scale(1.02);} }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  ::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important;}
  ::view-transition-old(root),::view-transition-new(root){animation:none!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← カフェ日記にもどる</a>
  <div class="title">カフェ日記 用語辞典</div>
  <div class="sub">ドリンクごとの、ちょっとおもしろいカフェ用語あつめ。<br>記録の「タグ」でも使えます。</div>
  <div class="nav" id="nav"></div>
  <input class="search" id="q" type="text" placeholder="用語を検索" autocomplete="off" aria-label="用語を検索">
  <div class="count" id="count" role="status" aria-live="polite"></div>
  <div id="list"></div>
  <div class="foot">カフェ日記 ／ CAFE GLOSSARY<br>※ ここに載っている言葉はだいたい非公式です</div>
</div>

<script>
const GROUPS=[
  {g:'共通', items:[
    {w:'推し', r:'おし', tag:'公式用語', d:'いちばん多く記録しているメニュー（ドリンクもスイーツも）＝あなたの“推し”。トップに表示されます。'},
    {w:'カフェ日記', r:'かふぇにっき', tag:'このアプリ', d:'<b>このアプリ</b>。行ったカフェと一杯を残す、あなたのカフェ年表。'},
    {w:'優勝', r:'ゆうしょう', d:'今日の一杯/一皿が最高だった、という最大級の感想。'},
    {w:'映え', r:'ばえ', d:'写真にしたくなる見た目。ラテアートやパフェなど。'},
    {w:'長居案件', r:'ながいあんけん', d:'居心地が良すぎて何時間でもいられるカフェ。'},
    {w:'リピ確', r:'リピかく', d:'「リピート確定」。また絶対来ると確信した瞬間に成立。'},
    {w:'隠れ家', r:'かくれが', d:'人に教えたくない、自分だけの落ち着くお店。'},
    {w:'ご褒美', r:'ごほうび', d:'頑張った自分へのご褒美カフェ・スイーツ。'},
    {w:'まったり', r:'-', d:'ゆっくり過ごす至福の時間。'},
    {w:'作業はかどる', r:'さぎょうはかどる', d:'集中できて作業が進むカフェ（電源・Wi-Fiありがち）。'},
  ]},
  {g:'コーヒー', items:[
    {w:'深煎り派', r:'ふかいりは', d:'苦み・コクのある深煎りを好む派。'},
    {w:'浅煎り派', r:'あさいりは', d:'フルーティーな酸味の浅煎りを好む派。'},
    {w:'スペシャルティ', r:'-', d:'産地や精製にこだわった高品質なコーヒー。'},
    {w:'ハンドドリップ', r:'-', d:'一杯ずつ手で淹れる、香り高い抽出。'},
    {w:'豆も購入', r:'まめもこうにゅう', d:'気に入って豆まで買って帰るやつ。'},
  ]},
  {g:'エスプレッソ', items:[
    {w:'ショット追加', r:'-', d:'濃さを足すためエスプレッソを1ショット追加。'},
    {w:'クレマ命', r:'クレマいのち', d:'表面の黄金色の泡(クレマ)こそ命、という美学。'},
    {w:'立ち飲み', r:'たちのみ', d:'カウンターでサッと一杯。イタリア式。'},
  ]},
  {g:'カフェラテ', items:[
    {w:'ラテアート', r:'-', d:'ミルクで描く模様。可愛いと優勝。'},
    {w:'オーツミルク', r:'-', d:'植物性ミルクに変更する選択。まろやか。'},
    {w:'甘さ控えめ', r:'あまさひかえめ', d:'シロップ少なめ/無しでミルクの甘みを楽しむ。'},
    {w:'ミルク多め', r:'ミルクおおめ', d:'やさしい味が好きな人の定番カスタム。'},
  ]},
  {g:'抹茶・和', items:[
    {w:'抹茶濃いめ', r:'まっちゃこいめ', d:'抹茶の苦みをしっかり感じたい派。'},
    {w:'和カフェ', r:'わカフェ', d:'和の設えでお茶やあんこを楽しむお店。'},
    {w:'京都気分', r:'きょうときぶん', d:'抹茶スイーツで旅した気分になるやつ。'},
  ]},
  {g:'紅茶・チャイ', items:[
    {w:'茶葉指定', r:'ちゃばしてい', d:'銘柄や産地を選んで頼むこだわり。'},
    {w:'ミルクティー', r:'-', d:'紅茶にミルクを合わせた定番。'},
    {w:'アールグレイ', r:'-', d:'ベルガモットの香り高い紅茶。'},
    {w:'マサラチャイ', r:'-', d:'スパイスを煮出した本格チャイ。'},
  ]},
  {g:'スイーツ', items:[
    {w:'別腹', r:'べつばら', d:'お腹いっぱいでもスイーツは入る現象。'},
    {w:'ふわふわ', r:'-', d:'スフレパンケーキ等の理想の食感。'},
    {w:'あんバター', r:'-', d:'あんこ＋バターの最強トースト。'},
    {w:'季節限定', r:'きせつげんてい', d:'今しか食べられない、という魔法の言葉。'},
  ]},
  {g:'スムージー・ソーダ', items:[
    {w:'ベリー系', r:'ベリーけい', d:'いちご/ミックスベリーの甘酸っぱいやつ。'},
    {w:'グリーン', r:'-', d:'野菜たっぷりのヘルシースムージー。'},
    {w:'レモネード', r:'-', d:'シュワっと爽やかな映えドリンク。'},
    {w:'映え色', r:'ばえいろ', d:'写真が盛れる鮮やかな色合い。'},
  ]},
]

const $=id=>document.getElementById(id)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// 上部クイックジャンプ
$('nav').innerHTML=GROUPS.map((g,i)=>`<button class="nav-chip" data-i="${i}">${esc(g.g)}</button>`).join('')
$('nav').querySelectorAll('.nav-chip').forEach(b=>b.onclick=()=>{
  $('q').value='';render('')
  const el=document.getElementById('grp-'+b.dataset.i)
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'})
})

function termHTML(t){
  return `<div class="term"><div class="term-h">
    <span class="term-w">${esc(t.w)}</span>
    ${t.r&&t.r!=='-'?`<span class="term-r">${esc(t.r)}</span>`:''}
    ${t.tag?`<span class="term-tag">${esc(t.tag)}</span>`:''}
  </div><div class="term-d">${t.d}</div></div>`
}
function render(q){
  q=(q||'').toLowerCase()
  let any=0,html=''
  GROUPS.forEach((grp,i)=>{
    const items=grp.items.filter(t=>!q||`${t.w} ${t.r} ${t.d} ${grp.g}`.toLowerCase().includes(q))
    if(!items.length)return
    any+=items.length
    html+=`<div class="group-h" id="grp-${i}">${esc(grp.g)}</div>`+items.map(termHTML).join('')
  })
  $('count').textContent=`${any} 語`
  $('list').innerHTML=any?html:'<div class="none">見つからなかった…</div>'
}
$('q').oninput=e=>render(e.target.value.trim())
render('')
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</body>
</html>
